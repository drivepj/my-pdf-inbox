<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Inbox | Modern UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #1a73e8;
            --surface: #f8fafd;
            --sidebar-hover: #e1e9f5;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f4f9; 
            color: #1f1f1f;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .search-bar:focus-within {
            background: white !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }

        .mail-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mail-item:hover {
            box-shadow: inset 4px 0 0 var(--primary), 0 4px 12px rgba(0,0,0,0.05);
            background-color: #f2f6fc;
            z-index: 10;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-20 flex items-center px-8 justify-between">
        <div class="flex items-center gap-3 min-w-[240px]">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                <i class="fa-solid fa-file-pdf text-white text-lg"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-gray-800">Cloud<span class="text-blue-600">PDF</span></span>
        </div>
        
        <div class="flex-1 max-w-2xl px-4">
            <div class="search-bar relative group flex items-center bg-white/80 rounded-2xl transition-all duration-300 border border-transparent">
                <i class="fa-solid fa-magnifying-glass absolute left-5 text-gray-400 group-focus-within:text-blue-500"></i>
                <input type="email" id="searchEmail" placeholder="Search by recipient email..." 
                    class="w-full pl-14 pr-32 py-4 bg-transparent border-none rounded-2xl outline-none text-sm"
                    onkeypress="if(event.key === 'Enter') loadData()">
                <button onclick="loadData()" class="absolute right-2 bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-semibold hover:bg-blue-700 transition-colors shadow-md shadow-blue-100">
                    Search
                </button>
            </div>
        </div>

        <div class="min-w-[240px] flex justify-end gap-3">
            <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center border border-gray-200 cursor-pointer hover:bg-gray-50">
                <i class="fa-solid fa-circle-question text-gray-500"></i>
            </div>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 shadow-md"></div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden px-6 pb-6 gap-6">
        <aside class="w-64 flex flex-col gap-2 pt-2">
            <a href="send.html" class="flex items-center justify-center gap-3 w-full py-4 bg-white text-blue-600 hover:text-white hover:bg-blue-600 rounded-2xl mb-6 font-bold transition-all shadow-sm border border-blue-100 hover:shadow-blue-200 hover:shadow-lg">
                <i class="fa-solid fa-plus text-lg"></i> Compose
            </a>
            
            <nav class="space-y-1">
                <div class="flex items-center gap-4 px-6 py-3 bg-blue-50 text-blue-700 rounded-xl cursor-pointer font-semibold shadow-sm border border-blue-100/50">
                    <i class="fa-solid fa-inbox text-lg"></i> Inbox
                </div>
                <div class="flex items-center gap-4 px-6 py-3 text-gray-500 hover:bg-white rounded-xl cursor-pointer transition-all">
                    <i class="fa-regular fa-paper-plane text-lg"></i> Sent
                </div>
                <div class="flex items-center gap-4 px-6 py-3 text-gray-500 hover:bg-white rounded-xl cursor-pointer transition-all">
                    <i class="fa-regular fa-star text-lg"></i> Starred
                </div>
                <div class="flex items-center gap-4 px-6 py-3 text-gray-500 hover:bg-white rounded-xl cursor-pointer transition-all">
                    <i class="fa-regular fa-trash-can text-lg"></i> Trash
                </div>
            </nav>
        </aside>

        <main class="flex-1 glass-card rounded-[2rem] shadow-xl shadow-gray-200/50 flex flex-col overflow-hidden border border-white">
            <div class="p-4 border-b border-gray-100 flex items-center justify-between px-8 bg-white/50">
                <div class="flex items-center gap-6">
                    <input type="checkbox" class="w-4 h-4 rounded accent-blue-600 cursor-pointer">
                    <button onclick="loadData(true)" class="text-gray-400 hover:text-blue-600 transition-colors">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                    <div class="h-4 w-[1px] bg-gray-200"></div>
                    <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">Your Documents</span>
                </div>
                <div class="flex items-center gap-2 text-gray-400 text-sm">
                    <span id="result-count">0 messages</span>
                </div>
            </div>
            
            <div id="inbox-list" class="overflow-y-auto flex-1">
                <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center p-12">
                    <div class="w-32 h-32 bg-blue-50 rounded-full flex items-center justify-center mb-6">
                        <i class="fa-solid fa-envelope-open text-blue-200 text-5xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-700 mb-2">Clean Workspace</h3>
                    <p id="status-text" class="text-gray-400 max-w-xs">Enter an email to fetch documents or wait for automatic update.</p>
                </div>
                
                <div id="list-content" class="hidden">
                    </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
