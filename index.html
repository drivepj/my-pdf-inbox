<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPDF | Inbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f6f8fc; overflow-x: hidden; }

        /* ปรับปรุง Modal ให้รองรับมือถือ */
        .gmail-modal {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            max-width: 510px;
            height: 100%;
            max-height: 500px;
            background: white;
            box-shadow: 0 8px 10px 1px rgba(0,0,0,0.14);
            border-radius: 12px 12px 0 0;
            display: none;
            flex-direction: column;
            z-index: 1000;
            transition: all 0.3s;
        }
        @media (min-width: 768px) {
            .gmail-modal { right: 70px; width: 510px; height: 450px; border-radius: 8px 8px 0 0; }
        }
        .gmail-modal.active { display: flex; }

        /* Sidebar สำหรับมือถือ */
        #sidebar {
            position: fixed;
            left: -260px;
            top: 0;
            bottom: 0;
            width: 260px;
            background: #f6f8fc;
            z-index: 1500;
            transition: 0.3s;
            padding: 20px;
        }
        #sidebar.open { left: 0; box-shadow: 10px 0 15px rgba(0,0,0,0.1); }
        @media (min-width: 1024px) {
            #sidebar { position: static; left: 0; width: 256px; display: block; box-shadow: none; }
            #mobile-overlay { display: none !important; }
        }

        .mail-item { border-bottom: 1px solid #f1f3f4; transition: all 0.1s; background-color: white; }
        .mail-item.unread { background-color: #f2f6fc; font-weight: 700; }
        .unread-dot { width: 8px; height: 8px; background-color: #1a73e8; border-radius: 50%; }
        
        .action-group { opacity: 0; }
        @media (max-width: 768px) { .action-group { opacity: 1; } }
        .mail-item:hover .action-group { opacity: 1; }

        /* Custom SweetAlert Style */
        .swal2-container { z-index: 3000 !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="mobile-overlay" class="fixed inset-0 bg-black/30 z-[1400] hidden" onclick="toggleSidebar()"></div>

    <header class="h-16 flex items-center px-4 justify-between bg-white border-b border-gray-100 sticky top-0 z-[1300]">
        <div class="flex items-center gap-2 lg:gap-4 min-w-fit">
            <button onclick="toggleSidebar()" class="p-3 hover:bg-gray-200 rounded-full transition-colors"><i class="fa-solid fa-bars text-gray-600"></i></button>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-file-pdf text-red-500 text-2xl"></i>
                <span class="text-lg lg:text-xl font-medium text-gray-600 hidden sm:inline">CloudPDF</span>
            </div>
        </div>
        <div class="flex-1 max-w-2xl px-2 lg:px-4">
            <div class="relative flex items-center bg-[#eaf1fb] rounded-full focus-within:bg-white focus-within:shadow-md transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-gray-500 text-sm"></i>
                <input type="text" id="searchEmail" placeholder="ค้นหา..." class="w-full pl-11 pr-4 py-2 lg:py-3 bg-transparent border-none outline-none text-sm lg:text-md" onkeypress="if(event.key === 'Enter') loadData()">
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div onclick="handleLogout()" id="userCircle" class="w-8 h-8 lg:w-10 lg:h-10 rounded-full bg-blue-700 flex items-center justify-center text-white text-sm font-medium cursor-pointer hover:opacity-80 transition-opacity shadow-sm">?</div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden p-0 lg:p-2 gap-0 lg:gap-2">
        <aside id="sidebar" class="flex flex-col">
            <button onclick="toggleComposeModal(); if(window.innerWidth < 1024) toggleSidebar();" class="flex items-center justify-center lg:justify-start gap-4 px-6 py-4 bg-[#c2e7ff] text-[#001d35] rounded-2xl mb-6 font-semibold hover:shadow-md transition-all w-full">
                <i class="fa-solid fa-pencil text-lg"></i> <span class="inline">เขียน</span>
            </button>
            <nav class="space-y-1">
                <button onclick="loadData(); if(window.innerWidth < 1024) toggleSidebar();" class="w-full flex items-center justify-between px-6 py-3 bg-[#d3e3fd] text-[#041e49] rounded-full text-sm font-bold">
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-inbox text-lg"></i> กล่องจดหมาย
                    </div>
                    <span id="badge-count" class="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full">0</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 bg-white lg:rounded-2xl shadow-sm flex flex-col overflow-hidden border border-gray-100">
            <div class="px-4 py-3 flex items-center justify-between border-b border-gray-100 bg-gray-50/50">
                <div class="flex items-center gap-4 text-gray-500">
                    <button onclick="loadData()" class="hover:bg-gray-200 p-2 rounded-full transition-colors"><i class="fa-solid fa-rotate-right"></i></button>
                    <span id="userDisplayName" class="text-[10px] lg:text-xs font-medium text-gray-400 truncate max-w-[150px]"></span>
                </div>
                <div class="text-[10px] lg:text-xs text-gray-500 font-medium"><span id="result-count">0</span> รายการ</div>
            </div>
            
            <div id="inbox-list" class="overflow-y-auto flex-1">
                <div id="status-container" class="flex justify-center p-10 text-gray-400 text-sm italic">กำลังโหลด...</div>
                <div id="list-content" class="hidden"></div>
            </div>
        </main>
    </div>

    <div id="composeModal" class="gmail-modal">
        <div class="flex items-center justify-between p-4 bg-gray-100/50 rounded-t-xl border-b">
            <span class="font-medium">ข้อความใหม่</span>
            <i onclick="toggleComposeModal()" class="fa-solid fa-xmark cursor-pointer p-1"></i>
        </div>
        <form id="uploadForm" class="flex-1 flex flex-col overflow-y-auto">
            <div class="px-4 py-1 border-b flex items-center"><label class="text-xs text-gray-400 w-12">จาก</label><input type="email" id="sender" class="flex-1 p-2 outline-none text-sm bg-transparent" readonly></div>
            <div class="px-4 py-1 border-b flex items-center"><label class="text-xs text-gray-400 w-12">ถึง</label><input type="email" id="receiver" class="flex-1 p-2 outline-none text-sm" required placeholder="อีเมลผู้รับ"></div>
            <div class="px-4 py-1 border-b flex items-center"><input type="text" id="subject" placeholder="เรื่อง" class="w-full p-2 outline-none text-sm font-medium" required></div>
            <div class="flex-1 p-4 lg:p-6 min-h-[150px]">
                <div class="group relative w-full h-full border-2 border-dashed border-gray-200 rounded-xl flex flex-col items-center justify-center hover:bg-gray-50 transition-all cursor-pointer">
                    <input type="file" id="fileInput" accept=".pdf" required class="absolute inset-0 opacity-0 cursor-pointer">
                    <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-300 mb-2 group-hover:text-blue-500"></i>
                    <p id="fileName" class="text-[11px] text-gray-400 px-4 text-center">แตะเพื่อแนบไฟล์ PDF</p>
                </div>
            </div>
            <div class="p-4 border-t bg-white sticky bottom-0 flex items-center justify-between">
                <button type="submit" id="submitBtn" class="bg-[#0b57d0] text-white px-8 py-2.5 rounded-full font-semibold text-sm shadow-lg active:scale-95 transition-all w-full lg:w-auto">ส่งเอกสาร</button>
            </div>
        </form>
    </div>

    <div id="previewModal" class="hidden fixed inset-0 bg-black/70 z-[2000] flex items-center justify-center p-0 lg:p-12">
        <div class="bg-white w-full h-full lg:rounded-xl flex flex-col shadow-2xl relative">
            <div class="p-4 flex justify-between items-center border-b bg-gray-50">
                <h3 id="previewTitle" class="font-bold text-gray-700 truncate text-sm lg:text-base mr-8"></h3>
                <button onclick="closePreview()" class="text-2xl lg:text-3xl text-gray-400 hover:text-red-500">&times;</button>
            </div>
            <iframe id="previewFrame" class="flex-1 w-full" src=""></iframe>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ijxeejypdjwwnejjbxbq.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqeGVlanlwZGp3d25lampieGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDA0NzIsImV4cCI6MjA5MzYxNjQ3Mn0.NHCzfKueKHdA763QBWZ_civHzUSUcie9aUqBBt7Yrek'; 
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if(window.innerWidth < 1024) {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('hidden');
            }
        }

        async function checkAuth() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'login.html'; } 
            else {
                currentUser = user;
                document.getElementById('userCircle').innerText = user.email.charAt(0).toUpperCase();
                document.getElementById('userDisplayName').innerText = user.email;
                document.getElementById('sender').value = user.email;
                loadData();
                subscribeToChanges();
            }
        }

        window.onload = checkAuth;

        function toggleComposeModal() { document.getElementById('composeModal').classList.toggle('active'); }

        function subscribeToChanges() {
            supabaseClient
                .channel('public:documents')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'documents' }, payload => {
                    loadData();
                })
                .subscribe();
        }

        async function openPreview(id, url, title, isRead) {
            document.getElementById('previewTitle').innerText = title;
            document.getElementById('previewFrame').src = url;
            document.getElementById('previewModal').classList.remove('hidden');
            if (!isRead) {
                await supabaseClient.from('documents').update({ is_read: true }).eq('id', id).eq('receiver', currentUser.email);
            }
        }

        function closePreview() {
            document.getElementById('previewModal').classList.add('hidden');
            document.getElementById('previewFrame').src = "";
        }

        async function loadData() {
            const search = document.getElementById('searchEmail').value.trim();
            const listContent = document.getElementById('list-content');
            const statusContainer = document.getElementById('status-container');
            
            try {
                let query = supabaseClient.from('documents').select('*');
                if (search) query = query.or(`sender.ilike.%${search}%,subject.ilike.%${search}%`);
                const { data, error } = await query.order('created_at', { ascending: false });

                if (error) throw error;
                statusContainer.classList.add('hidden');
                listContent.classList.remove('hidden');
                
                document.getElementById('result-count').innerText = data.length;
                document.getElementById('badge-count').innerText = data.filter(d => !d.is_read).length;

                if (data.length === 0) {
                    listContent.innerHTML = '<div class="p-10 text-center text-gray-400 text-sm">ไม่มีเอกสาร</div>';
                    return;
                }

                listContent.innerHTML = data.map(item => `
                    <div class="mail-item flex items-center px-3 lg:px-4 py-3 group cursor-pointer relative ${!item.is_read ? 'unread' : ''}">
                        <div class="flex items-center gap-3 mr-3">
                            <div class="w-2 flex justify-center">
                                ${!item.is_read ? '<div class="unread-dot"></div>' : ''}
                            </div>
                        </div>
                        <div class="flex flex-1 min-w-0 flex-col lg:flex-row lg:items-center" onclick="openPreview(${item.id}, '${item.file_url}', '${item.subject}', ${item.is_read})">
                            <span class="text-xs lg:text-sm text-gray-600 lg:w-56 truncate">${item.sender.split('@')[0]}</span>
                            <div class="flex-1 truncate">
                                <span class="text-sm text-gray-900">${item.subject || '(ไม่มีชื่อเรื่อง)'}</span>
                            </div>
                        </div>
                        <div class="text-[10px] text-gray-400 ml-2 whitespace-nowrap lg:group-hover:opacity-0 transition-opacity">
                            ${new Date(item.created_at).toLocaleDateString('th-TH', {day:'numeric', month:'short'})}
                        </div>
                        <div class="action-group absolute right-2 flex items-center gap-1 bg-white/90 backdrop-blur-sm pl-2 rounded-l-lg">
                            <button onclick="deleteDoc(${item.id})" class="p-2 text-gray-400 hover:text-red-500"><i class="fa-regular fa-trash-can"></i></button>
                        </div>
                    </div>
                `).join('');
            } catch (err) { statusContainer.innerText = "Error loading data"; }
        }

        // ฟังก์ชัน Logout แบบใหม่ที่ปรับปรุงแล้ว
        async function handleLogout() {
            const { isConfirmed } = await Swal.fire({
                title: 'ออกจากระบบ?',
                text: "คุณต้องการออกจากบัญชี CloudPDF ใช่หรือไม่",
                icon: 'question',
                iconColor: '#0b57d0',
                showCancelButton: true,
                confirmButtonColor: '#0b57d0',
                cancelButtonColor: '#f1f3f4',
                confirmButtonText: 'ออกจากระบบ',
                cancelButtonText: 'ยกเลิก',
                reverseButtons: true,
                width: window.innerWidth < 768 ? '90%' : '400px',
                customClass: {
                    popup: 'rounded-3xl shadow-2xl',
                    title: 'text-xl font-semibold text-gray-800',
                    htmlContainer: 'text-gray-500',
                    confirmButton: 'rounded-full px-8 py-2.5 text-sm font-medium',
                    cancelButton: 'rounded-full px-8 py-2.5 text-sm font-medium text-gray-600'
                }
            });

            if (isConfirmed) { 
                await supabaseClient.auth.signOut(); 
                window.location.href = 'login.html'; 
            }
        }

        document.getElementById('fileInput').onchange = (e) => {
            document.getElementById('fileName').innerText = e.target.files[0]?.name || "แนบไฟล์ PDF";
        };

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const file = document.getElementById('fileInput').files[0];
            if(!file) return;

            btn.disabled = true; btn.innerText = "กำลังส่ง...";
            const filePath = `uploads/${Date.now()}_${file.name}`;

            try {
                const { error: uploadError } = await supabaseClient.storage.from('pdfs').upload(filePath, file);
                if (uploadError) throw uploadError;

                const { data: urlData } = supabaseClient.storage.from('pdfs').getPublicUrl(filePath);
                
                const { error: insertError } = await supabaseClient.from('documents').insert([{
                    sender: currentUser.email,
                    receiver: document.getElementById('receiver').value,
                    subject: document.getElementById('subject').value,
                    file_url: urlData.publicUrl,
                    is_read: false
                }]);
                
                if (insertError) throw insertError;
                Swal.fire({ icon: 'success', title: 'ส่งสำเร็จ', timer: 1000, showConfirmButton: false });
                toggleComposeModal(); loadData(); e.target.reset();
                document.getElementById('fileName').innerText = "แตะเพื่อแนบไฟล์ PDF";
            } catch (err) { Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: err.message }); }
            finally { btn.disabled = false; btn.innerText = "ส่งเอกสาร"; }
        };

        async function deleteDoc(id) {
            const { isConfirmed } = await Swal.fire({
                title: 'ลบรายการ?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'ลบเลย',
                cancelButtonText: 'ยกเลิก',
                customClass: {
                    popup: 'rounded-3xl',
                    confirmButton: 'rounded-full px-6 py-2',
                    cancelButton: 'rounded-full px-6 py-2'
                }
            });
            if (isConfirmed) { 
                await supabaseClient.from('documents').delete().eq('id', id).eq('receiver', currentUser.email);
                loadData(); 
            }
        }
    </script>
</body>
</html>
