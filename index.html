<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPDF | Inbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f6f8fc; overflow: hidden; }

        .gmail-modal {
            position: fixed;
            bottom: 0;
            right: 70px;
            width: 510px;
            height: 450px;
            background: white;
            box-shadow: 0 8px 10px 1px rgba(0,0,0,0.14), 0 3px 14px 2px rgba(0,0,0,0.12), 0 5px 5px -3px rgba(0,0,0,0.2);
            border-radius: 8px 8px 0 0;
            display: none;
            flex-direction: column;
            z-index: 1000;
        }
        .gmail-modal.active { display: flex; }
        .gmail-header { background: #404040; color: white; padding: 10px 15px; border-radius: 8px 8px 0 0; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .gmail-input-group { border-bottom: 1px solid #f0f0f0; padding: 2px 15px; display: flex; align-items: center; }
        .gmail-input-group label { color: #777; font-size: 14px; min-width: 35px; }
        .gmail-input { width: 100%; border: none; outline: none; padding: 8px 0; font-size: 14px; }
        
        .mail-item { border-bottom: 1px solid #f1f3f4; transition: all 0.1s; background-color: white; }
        .mail-item:hover { box-shadow: inset 1px 0 0 #dadce0, inset -1px 0 0 #dadce0, 0 1px 2px 0 rgba(60,64,67,.3); z-index: 1; }
        .mail-item.unread { background-color: #f2f6fc; font-weight: 700; }
        .unread-dot { width: 8px; height: 8px; background-color: #1a73e8; border-radius: 50%; }
        
        .action-group { opacity: 0; }
        .mail-item:hover .action-group { opacity: 1; }
        #previewModal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-16 flex items-center px-4 justify-between bg-white border-b border-gray-100">
        <div class="flex items-center gap-4 min-w-[240px]">
            <button class="p-3 hover:bg-gray-200 rounded-full transition-colors"><i class="fa-solid fa-bars text-gray-600"></i></button>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-file-pdf text-red-500 text-2xl"></i>
                <span class="text-xl font-medium text-gray-600">CloudPDF</span>
            </div>
        </div>
        <div class="flex-1 max-w-3xl">
            <div class="relative flex items-center bg-[#eaf1fb] rounded-full mx-4 focus-within:bg-white focus-within:shadow-md transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-5 text-gray-500 text-sm"></i>
                <input type="text" id="searchEmail" placeholder="ค้นหาจากชื่อผู้ส่ง หรือหัวเรื่อง" class="w-full pl-14 pr-4 py-3 bg-transparent border-none outline-none text-md" onkeypress="if(event.key === 'Enter') loadData()">
            </div>
        </div>
        <div class="min-w-[240px] flex justify-end px-4">
            <div onclick="handleLogout()" id="userCircle" class="w-10 h-10 rounded-full bg-blue-700 flex items-center justify-center text-white font-medium cursor-pointer hover:opacity-80 transition-opacity shadow-sm" title="คลิกเพื่อออกจากระบบ">?</div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden p-2 gap-2">
        <aside class="w-64 pr-4 pt-2">
            <button onclick="toggleComposeModal()" class="flex items-center gap-4 px-6 py-4 bg-[#c2e7ff] text-[#001d35] rounded-2xl mb-4 font-semibold hover:shadow-md transition-all w-full">
                <i class="fa-solid fa-pencil text-lg"></i> เขียน
            </button>
            <button onclick="loadData()" class="w-full flex items-center justify-between px-6 py-2 bg-[#d3e3fd] text-[#041e49] rounded-full text-sm font-bold shadow-sm">
                <div class="flex items-center gap-4">
                    <i class="fa-solid fa-inbox text-lg"></i> กล่องจดหมาย
                </div>
                <span id="badge-count" class="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full">0</span>
            </button>
        </aside>

        <main class="flex-1 bg-white rounded-2xl shadow-sm flex flex-col overflow-hidden border border-gray-100">
            <div class="px-4 py-2 flex items-center justify-between border-b border-gray-100">
                <div class="flex items-center gap-4 text-gray-500">
                    <input type="checkbox" class="cursor-pointer">
                    <button onclick="loadData()" class="hover:bg-gray-100 p-2 rounded-full"><i class="fa-solid fa-rotate-right"></i></button>
                    <span id="userDisplayName" class="text-xs font-medium text-gray-400"></span>
                </div>
                <div class="text-xs text-gray-500 font-medium"><span id="result-count">0</span> รายการ</div>
            </div>
            <div id="inbox-list" class="overflow-y-auto flex-1">
                <div id="status-container" class="flex justify-center p-10 text-gray-400 text-sm italic">กำลังโหลด...</div>
                <div id="list-content" class="hidden"></div>
            </div>
        </main>
    </div>

    <div id="composeModal" class="gmail-modal">
        <div class="gmail-header">
            <span>ข้อความใหม่</span>
            <div class="flex gap-3 opacity-80">
                <i onclick="toggleComposeModal()" class="fa-solid fa-xmark cursor-pointer"></i>
            </div>
        </div>
        <form id="uploadForm" class="flex-1 flex flex-col">
            <div class="gmail-input-group"><label>จาก</label><input type="email" id="sender" class="gmail-input bg-gray-50" readonly></div>
            <div class="gmail-input-group"><label>ถึง</label><input type="email" id="receiver" class="gmail-input" required placeholder="อีเมลผู้รับ"></div>
            <div class="gmail-input-group"><input type="text" id="subject" placeholder="เรื่อง" class="gmail-input font-medium" required></div>
            <div class="flex-1 p-6">
                <div class="group relative w-full h-full border-2 border-dashed border-gray-100 rounded-lg flex flex-col items-center justify-center hover:bg-gray-50 transition-all cursor-pointer">
                    <input type="file" id="fileInput" accept=".pdf" required class="absolute inset-0 opacity-0 cursor-pointer">
                    <i class="fa-solid fa-paperclip text-2xl text-gray-200 mb-2 group-hover:text-blue-500"></i>
                    <p id="fileName" class="text-[11px] text-gray-400 text-center">คลิกเพื่อแนบไฟล์ PDF</p>
                </div>
            </div>
            <div class="gmail-footer p-3 border-t border-gray-100 flex items-center justify-between">
                <button type="submit" id="submitBtn" class="bg-[#0b57d0] text-white px-6 py-2 rounded-full font-medium text-sm hover:bg-[#0842a0]">ส่ง</button>
            </div>
        </form>
    </div>

    <div id="previewModal" class="hidden fixed inset-0 bg-black/50 z-[2000] flex items-center justify-center p-6 md:p-12">
        <div class="bg-white w-full h-full rounded-xl flex flex-col shadow-2xl">
            <div class="p-4 flex justify-between items-center border-b bg-gray-50 rounded-t-xl">
                <h3 id="previewTitle" class="font-bold text-gray-700 truncate mr-4"></h3>
                <button onclick="closePreview()" class="text-3xl leading-none text-gray-400 hover:text-red-500">&times;</button>
            </div>
            <iframe id="previewFrame" class="flex-1 w-full rounded-b-xl" src=""></iframe>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ijxeejypdjwwnejjbxbq.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqeGVlanlwZGp3d25lampieGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDA0NzIsImV4cCI6MjA5MzYxNjQ3Mn0.NHCzfKueKHdA763QBWZ_civHzUSUcie9aUqBBt7Yrek'; 
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;

        async function checkAuth() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'login.html'; } 
            else {
                currentUser = user;
                document.getElementById('userCircle').innerText = user.email.charAt(0).toUpperCase();
                document.getElementById('userDisplayName').innerText = `Logged in as: ${user.email}`;
                document.getElementById('sender').value = user.email;
                loadData();
                subscribeToChanges();
            }
        }

        window.onload = checkAuth;

        function toggleComposeModal() { document.getElementById('composeModal').classList.toggle('active'); }

        function subscribeToChanges() {
            supabaseClient
                .channel('public:documents')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'documents' }, payload => {
                    loadData();
                    if (payload.eventType === 'INSERT' && payload.new.receiver === currentUser.email) {
                        Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: 'มีเอกสารใหม่!', showConfirmButton: false, timer: 3000 });
                    }
                })
                .subscribe();
        }

        async function openPreview(id, url, title, isRead) {
            document.getElementById('previewTitle').innerText = title;
            document.getElementById('previewFrame').src = url;
            document.getElementById('previewModal').classList.remove('hidden');

            // ถ้ายังไม่ได้อ่าน ให้ Update เป็นอ่านแล้ว
            if (!isRead) {
                await supabaseClient.from('documents').update({ is_read: true }).eq('id', id);
                // loadData() จะถูกเรียกอัตโนมัติจาก realtime subscription
            }
        }

        function closePreview() {
            document.getElementById('previewModal').classList.add('hidden');
            document.getElementById('previewFrame').src = "";
        }

        async function loadData() {
            const search = document.getElementById('searchEmail').value.trim();
            const listContent = document.getElementById('list-content');
            const statusContainer = document.getElementById('status-container');
            
            try {
                let query = supabaseClient.from('documents').select('*');
                
                // กรองเฉพาะที่ส่งถึงเรา
                query = query.eq('receiver', currentUser.email);

                if (search) query = query.or(`sender.ilike.%${search}%,subject.ilike.%${search}%`);
                
                const { data, error } = await query.order('created_at', { ascending: false });

                if (error) throw error;
                statusContainer.classList.add('hidden');
                listContent.classList.remove('hidden');
                
                // นับจำนวนที่ยังไม่ได้อ่าน
                const unreadCount = data.filter(d => !d.is_read).length;
                document.getElementById('result-count').innerText = data.length;
                document.getElementById('badge-count').innerText = unreadCount;

                listContent.innerHTML = data.map(item => `
                    <div class="mail-item flex items-center px-4 py-2 group cursor-pointer relative ${!item.is_read ? 'unread' : ''}">
                        <div class="flex items-center gap-4 mr-4">
                            <div class="w-4 flex justify-center">
                                ${!item.is_read ? '<div class="unread-dot"></div>' : '<input type="checkbox" class="cursor-pointer">'}
                            </div>
                            <i class="fa-regular fa-star text-gray-300 hover:text-yellow-400"></i>
                        </div>
                        <div class="flex flex-1 min-w-0 items-center" onclick="openPreview(${item.id}, '${item.file_url}', '${item.subject}', ${item.is_read})">
                            <span class="w-56 text-sm text-gray-800 truncate">${item.sender || 'Unknown'}</span>
                            <div class="flex-1 truncate pr-20">
                                <span class="text-sm text-gray-800">${item.subject || '(ไม่มีชื่อเรื่อง)'}</span>
                                <span class="text-sm text-gray-500 font-normal ml-2">- ดูรายละเอียดเอกสารฉบับนี้</span>
                            </div>
                        </div>
                        <div class="text-[12px] font-bold text-gray-600 group-hover:opacity-0 transition-opacity">
                            ${new Date(item.created_at).toLocaleDateString('th-TH', {day:'numeric', month:'short'})}
                        </div>
                        <div class="action-group absolute right-4 flex items-center gap-1 bg-white pl-2">
                            <button onclick="openPreview(${item.id}, '${item.file_url}', '${item.subject}', ${item.is_read})" class="p-2 hover:bg-gray-100 rounded-full text-blue-600" title="ดูไฟล์"><i class="fa-solid fa-eye"></i></button>
                            <button onclick="deleteDoc(${item.id})" class="p-2 hover:bg-gray-100 rounded-full text-gray-400 hover:text-red-500"><i class="fa-regular fa-trash-can"></i></button>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function handleLogout() {
            const { isConfirmed } = await Swal.fire({ title: 'ออกจากระบบ?', icon: 'question', showCancelButton: true });
            if (isConfirmed) { await supabaseClient.auth.signOut(); window.location.href = 'login.html'; }
        }

        document.getElementById('fileInput').onchange = (e) => {
            document.getElementById('fileName').innerText = e.target.files[0]?.name || "แนบไฟล์ PDF";
        };

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "กำลังส่ง...";

            const file = document.getElementById('fileInput').files[0];
            const filePath = `uploads/${Date.now()}_${file.name}`;

            try {
                const { error: uploadError } = await supabaseClient.storage.from('pdfs').upload(filePath, file);
                if (uploadError) throw uploadError;

                const { data: urlData } = supabaseClient.storage.from('pdfs').getPublicUrl(filePath);
                
                await supabaseClient.from('documents').insert([{
                    sender: currentUser.email,
                    receiver: document.getElementById('receiver').value,
                    subject: document.getElementById('subject').value,
                    file_url: urlData.publicUrl,
                    is_read: false // เริ่มต้นที่ยังไม่ได้อ่าน
                }]);
                
                Swal.fire({ icon: 'success', title: 'ส่งสำเร็จ', timer: 1500, showConfirmButton: false });
                toggleComposeModal(); loadData(); e.target.reset();
                document.getElementById('fileName').innerText = "คลิกเพื่อแนบไฟล์ PDF";
            } catch (err) { 
                Swal.fire({ icon: 'error', title: 'Error', text: err.message });
            } finally { btn.disabled = false; btn.innerText = "ส่ง"; }
        };

        async function deleteDoc(id) {
            const { isConfirmed } = await Swal.fire({ title: 'ลบรายการ?', icon: 'warning', showCancelButton: true });
            if (isConfirmed) { await supabaseClient.from('documents').delete().eq('id', id); loadData(); }
        }
    </script>
</body>
</html>
