<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPDF | Inbox & Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Inter', 'Kanit', sans-serif; background-color: #f6f8fc; overflow-x: hidden; }

        #page-loader {
            position: fixed; inset: 0; background-color: #ffffff; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        .loading-bar-container { width: 180px; height: 4px; background-color: #f1f3f4; border-radius: 2px; overflow: hidden; margin-top: 24px; }
        .loading-bar-progress { width: 0%; height: 100%; background-color: #1a73e8; transition: width 0.4s ease-in-out; }

        main { opacity: 0; transform: translateY(15px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
        main.content-ready { opacity: 1; transform: translateY(0); }

        .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 24px; cursor: pointer; border-radius: 0 20px 20px 0; font-size: 14px; color: #444746; transition: all 0.2s; margin-right: 12px; }
        .nav-item:hover { background-color: #eaebef; }
        .nav-item.active { background-color: #d3e3fd; color: #041e49; font-weight: 600; }
        .nav-item i { width: 24px; font-size: 18px; }

        .gmail-modal { position: fixed; bottom: 0; right: 0; width: 100%; max-width: 550px; height: 100%; max-height: 600px; background: white; box-shadow: 0 8px 10px 1px rgba(0,0,0,0.14); border-radius: 12px 12px 0 0; display: none; flex-direction: column; z-index: 1000; transition: all 0.3s; }
        @media (min-width: 768px) { .gmail-modal { right: 70px; width: 550px; height: 650px; border-radius: 8px 8px 0 0; } }
        .gmail-modal.active { display: flex; }

        #sidebar { position: fixed; left: -260px; top: 0; bottom: 0; width: 260px; background: #f6f8fc; z-index: 1500; transition: 0.3s; padding: 20px 0; }
        #sidebar.open { left: 0; box-shadow: 10px 0 15px rgba(0,0,0,0.1); }
        @media (min-width: 1024px) { #sidebar { position: static; left: 0; width: 256px; display: block; box-shadow: none; } #mobile-overlay { display: none !important; } }

        .mail-item { border-bottom: 1px solid #f1f3f4; transition: all 0.1s; background-color: white; }
        .mail-item.unread { background-color: #f2f6fc; }
        .unread-dot { width: 8px; height: 8px; background-color: #1a73e8; border-radius: 50%; }
        
        .mail-checkbox { cursor: pointer; width: 16px; height: 16px; accent-color: #444; }
        .swal2-container { z-index: 3000 !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="page-loader">
        <i class="fa-solid fa-file-pdf text-red-500 text-5xl"></i>
        <div class="loading-bar-container">
            <div id="loading-progress" class="loading-bar-progress"></div>
        </div>
        <div class="mt-4 text-xs text-gray-400 font-medium tracking-widest uppercase">CloudPDF</div>
    </div>

    <div id="mobile-overlay" class="fixed inset-0 bg-black/30 z-[1400] hidden" onclick="toggleSidebar()"></div>

    <header class="h-16 flex items-center px-4 justify-between bg-white border-b border-gray-100 sticky top-0 z-[1300]">
        <div class="flex items-center gap-2 lg:gap-4 min-w-fit">
            <button onclick="toggleSidebar()" class="p-3 hover:bg-gray-200 rounded-full transition-colors lg:hidden"><i class="fa-solid fa-bars text-gray-600"></i></button>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-file-pdf text-red-500 text-2xl"></i>
                <span class="text-lg lg:text-xl font-medium text-gray-700 hidden sm:inline">CloudPDF</span>
            </div>
        </div>
        <div class="flex-1 max-w-2xl px-2 lg:px-4">
            <div class="relative flex items-center bg-[#eaf1fb] rounded-full focus-within:bg-white focus-within:shadow-md transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-gray-500 text-sm"></i>
                <input type="text" id="searchEmail" placeholder="ค้นหาเอกสาร..." class="w-full pl-11 pr-4 py-2 lg:py-3 bg-transparent border-none outline-none text-sm" onkeypress="if(event.key === 'Enter') loadData(currentFilter)">
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div onclick="handleLogout()" id="userCircle" class="w-8 h-8 lg:w-10 lg:h-10 rounded-full bg-blue-700 flex items-center justify-center text-white text-sm font-medium cursor-pointer shadow-sm">?</div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden p-0 lg:p-2 gap-0 lg:gap-2">
        <aside id="sidebar" class="flex flex-col">
            <div class="px-4 mb-4">
                <button onclick="toggleComposeModal()" class="flex items-center gap-4 px-6 py-4 bg-[#c2e7ff] text-[#001d35] rounded-2xl font-semibold hover:shadow-md transition-all">
                    <i class="fa-solid fa-pencil text-lg"></i> <span>เขียน</span>
                </button>
            </div>
            <nav class="flex-1 overflow-y-auto">
                <div id="nav-all" onclick="loadData('all')" class="nav-item active">
                    <div class="flex items-center gap-4"><i class="fa-solid fa-inbox"></i> รายการทั้งหมด</div>
                </div>
                <div id="nav-inbox" onclick="loadData('inbox')" class="nav-item">
                    <div class="flex items-center gap-4"><i class="fa-regular fa-envelope"></i> กล่องจดหมาย</div>
                    <span id="badge-inbox" class="text-xs font-bold text-blue-600"></span>
                </div>
                <div id="nav-sent" onclick="loadData('sent')" class="nav-item">
                    <div class="flex items-center gap-4"><i class="fa-regular fa-paper-plane"></i> ส่งแล้ว</div>
                </div>
            </nav>
        </aside>

        <main class="flex-1 bg-white lg:rounded-2xl shadow-sm flex flex-col overflow-hidden border border-gray-100">
            <div class="px-4 py-2 flex items-center justify-between border-b border-gray-100 bg-white">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-1 hover:bg-gray-100 p-1.5 rounded cursor-pointer group">
                        <input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)" class="mail-checkbox">
                        <i class="fa-solid fa-caret-down text-[10px] text-gray-500 group-hover:text-black"></i>
                    </div>
                    <button onclick="loadData(currentFilter)" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                    <div id="bulk-actions" class="hidden flex items-center gap-2 border-l pl-4">
                        <button onclick="bulkDelete()" class="p-2 hover:bg-red-50 rounded-full text-gray-500 hover:text-red-600">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-2 text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded-md">
                    <span id="result-count">0</span> รายการ
                </div>
            </div>
            
            <div id="inbox-list" class="overflow-y-auto flex-1">
                <div id="status-container" class="flex justify-center p-10 text-gray-400 text-sm italic">กำลังโหลด...</div>
                <div id="list-content" class="hidden"></div>
            </div>
        </main>
    </div>

    <div id="composeModal" class="gmail-modal">
        <div class="flex items-center justify-between p-3 bg-[#f2f6fc] rounded-t-xl border-b">
            <span class="text-sm font-medium text-gray-800 ml-2">ข้อความใหม่</span>
            <div class="flex items-center gap-4 text-gray-500 mr-2">
                <i onclick="toggleComposeModal()" class="fa-solid fa-xmark cursor-pointer text-lg hover:text-black"></i>
            </div>
        </div>
        <form id="uploadForm" class="flex-1 flex flex-col overflow-hidden bg-white">
            <div class="px-4 py-1.5 border-b flex items-center gap-2">
                <span class="text-sm text-gray-500 w-8">ถึง</span>
                <input type="email" id="receiver" class="flex-1 outline-none text-sm py-1" required>
            </div>
            <div class="px-4 py-1.5 border-b">
                <input type="text" id="subject" class="w-full outline-none text-sm py-1" required placeholder="เรื่อง">
            </div>
            <div class="px-4 py-4 bg-gray-50/30 flex-1 overflow-y-auto">
                <span class="text-[11px] font-bold text-blue-600 uppercase tracking-widest block mb-3">ประเภทเอกสาร</span>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <label class="flex items-center gap-2 p-2 bg-white border rounded hover:shadow-sm cursor-pointer"><input type="radio" name="category" value="ทั่วไป" checked class="accent-blue-600"><span class="text-xs text-gray-600">ทั่วไป</span></label>
                    <label class="flex items-center gap-2 p-2 bg-white border rounded hover:shadow-sm cursor-pointer"><input type="radio" name="category" value="ใบเสร็จ" class="accent-blue-600"><span class="text-xs text-gray-600">ใบเสร็จ</span></label>
                </div>
                <div id="attachmentArea" class="hidden border-t pt-3 space-y-2">
                    <div id="pdfPreview" class="hidden bg-gray-100 p-2 rounded flex items-center justify-between">
                        <div class="flex items-center gap-2"><i class="fa-solid fa-file-pdf text-red-500"></i><span id="pdfNameDisplay" class="text-xs text-gray-600 truncate max-w-[200px]"></span></div>
                        <i onclick="clearAttachment('pdf')" class="fa-solid fa-xmark text-xs text-gray-400 cursor-pointer hover:text-red-500 p-1"></i>
                    </div>
                    <div id="imagePreview" class="hidden relative inline-block">
                        <img id="imgPreviewSrc" src="" class="h-20 w-20 object-cover rounded-lg border shadow-sm">
                        <div onclick="clearAttachment('image')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center cursor-pointer shadow-md"><i class="fa-solid fa-xmark text-[10px]"></i></div>
                    </div>
                </div>
            </div>
            <div class="p-4 flex items-center justify-between border-t bg-white">
                <div class="flex items-center gap-1">
                    <button type="submit" id="submitBtn" class="bg-[#0b57d0] text-white px-6 py-2 rounded-full font-medium text-sm hover:bg-[#0842a0]">ส่ง</button>
                    <div class="flex items-center gap-1 ml-4 text-gray-500">
                        <label class="w-9 h-9 flex items-center justify-center hover:bg-gray-100 rounded-md cursor-pointer"><input type="file" id="fileInput" accept=".pdf" class="hidden" onchange="handleFileSelect(this)"><i class="fa-solid fa-paperclip text-sm"></i></label>
                        <label class="w-9 h-9 flex items-center justify-center hover:bg-gray-100 rounded-md cursor-pointer"><input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageSelect(this)"><i class="fa-regular fa-image text-sm"></i></label>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <div id="previewModal" class="hidden fixed inset-0 bg-black/70 z-[2000] flex items-center justify-center p-0 lg:p-8">
        <div class="bg-white w-full h-full lg:rounded-xl flex flex-col relative overflow-hidden">
            <div class="p-4 flex justify-between items-center border-b bg-white sticky top-0 z-10">
                <div id="previewTitle" class="flex-1"></div>
                <button onclick="closePreview()" class="text-3xl text-gray-400 hover:text-gray-600 transition-colors ml-4">&times;</button>
            </div>
            <div id="previewContent" class="flex-1 w-full overflow-y-auto bg-[#f6f8fc] flex flex-col items-center">
                </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ijxeejypdjwwnejjbxbq.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqeGVlanlwZGp3d25lampieGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDA0NzIsImV4cCI6MjA5MzYxNjQ3Mn0.NHCzfKueKHdA763QBWZ_civHzUSUcie9aUqBBt7Yrek'; 
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let currentFilter = 'all'; 
        let selectedIds = new Set();

        // 1. ฟังก์ชันสร้าง Badge สีตามสถานะ
        function getStatusBadge(status) {
            const statusMap = {
                'pending': { text: 'รอดำเนินการ', class: 'bg-yellow-100 text-yellow-700 border-yellow-200' },
                'approved': { text: 'อนุมัติแล้ว', class: 'bg-green-100 text-green-700 border-green-200' },
                'rejected': { text: 'ถูกปฏิเสธ', class: 'bg-red-100 text-red-700 border-red-200' }
            };
            const s = statusMap[status] || { text: status, class: 'bg-gray-100 text-gray-600 border-gray-200' };
            return `<span class="px-2 py-0.5 rounded border text-[10px] font-bold uppercase ${s.class}">${s.text}</span>`;
        }

        async function checkAuth() {
            const loader = document.getElementById('page-loader');
            const progressBar = document.getElementById('loading-progress');
            try {
                progressBar.style.width = '30%';
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) { window.location.href = 'login.html'; return; } 
                progressBar.style.width = '60%';
                currentUser = user;
                document.getElementById('userCircle').innerText = user.email.charAt(0).toUpperCase();
                await loadData('all');
                subscribeToChanges();
                progressBar.style.width = '100%';
                setTimeout(() => {
                    loader.style.opacity = '0'; loader.style.visibility = 'hidden';
                    document.querySelector('main').classList.add('content-ready');
                    setTimeout(() => loader.classList.add('hidden'), 500);
                }, 300);
            } catch (err) { window.location.href = 'login.html'; }
        }
        window.onload = checkAuth;

        function subscribeToChanges() {
            supabaseClient.channel('public:documents').on('postgres_changes', { event: '*', schema: 'public', table: 'documents' }, () => loadData(currentFilter)).subscribe();
        }

        // Bulk Actions
        function toggleSelectAll(master) {
            const checkboxes = document.querySelectorAll('.mail-checkbox:not(#selectAll)');
            selectedIds.clear();
            checkboxes.forEach(cb => {
                cb.checked = master.checked;
                if (master.checked) selectedIds.add(parseInt(cb.getAttribute('data-id')));
            });
            updateBulkUI();
        }
        function toggleItemSelect(id, cb) {
            if (cb.checked) selectedIds.add(id);
            else { selectedIds.delete(id); document.getElementById('selectAll').checked = false; }
            updateBulkUI();
        }
        function updateBulkUI() {
            document.getElementById('bulk-actions').style.display = selectedIds.size > 0 ? 'flex' : 'none';
        }
        async function bulkDelete() {
            const { isConfirmed } = await Swal.fire({ title: `ลบ ${selectedIds.size} รายการ?`, icon: 'warning', showCancelButton: true, confirmButtonText: 'ลบ' });
            if (isConfirmed) {
                await supabaseClient.from('documents').delete().in('id', Array.from(selectedIds));
                selectedIds.clear(); document.getElementById('selectAll').checked = false;
                updateBulkUI(); loadData(currentFilter);
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('mobile-overlay').classList.toggle('hidden'); }
        function toggleComposeModal() { 
            const modal = document.getElementById('composeModal');
            modal.classList.toggle('active');
            if (!modal.classList.contains('active')) { document.getElementById('uploadForm').reset(); clearAttachment('all'); }
        }
        function closePreview() { document.getElementById('previewModal').classList.add('hidden'); }

        // File Attachment Handlers
        function handleFileSelect(input) {
            if (input.files[0]) {
                document.getElementById('pdfNameDisplay').innerText = input.files[0].name;
                document.getElementById('attachmentArea').classList.remove('hidden');
                document.getElementById('pdfPreview').classList.remove('hidden');
            }
        }
        function handleImageSelect(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imgPreviewSrc').src = e.target.result;
                    document.getElementById('attachmentArea').classList.remove('hidden');
                    document.getElementById('imagePreview').classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function clearAttachment(type) {
            if (type === 'pdf' || type === 'all') { document.getElementById('fileInput').value = ""; document.getElementById('pdfPreview').classList.add('hidden'); }
            if (type === 'image' || type === 'all') { document.getElementById('imageInput').value = ""; document.getElementById('imagePreview').classList.add('hidden'); document.getElementById('imgPreviewSrc').src = ""; }
            if (document.getElementById('pdfPreview').classList.contains('hidden') && document.getElementById('imagePreview').classList.contains('hidden')) {
                document.getElementById('attachmentArea').classList.add('hidden');
            }
        }

        // Load Data with Status Badge
        async function loadData(filter = 'all') {
            currentFilter = filter;
            selectedIds.clear(); document.getElementById('selectAll').checked = false; updateBulkUI();
            const search = document.getElementById('searchEmail').value.trim();
            const listContent = document.getElementById('list-content');
            const statusContainer = document.getElementById('status-container');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const navEl = document.getElementById(`nav-${filter}`);
            if(navEl) navEl.classList.add('active');
            
            try {
                let query = supabaseClient.from('documents').select('*');
                if (currentUser.email !== 'admin@gmail.com') {
                    if (filter === 'inbox') query = query.eq('receiver', currentUser.email);
                    else if (filter === 'sent') query = query.eq('sender', currentUser.email);
                    else query = query.or(`sender.eq.${currentUser.email},receiver.eq.${currentUser.email}`);
                }
                if (search) query = query.or(`sender.ilike.%${search}%,subject.ilike.%${search}%,receiver.ilike.%${search}%`);
                
                const { data, error } = await query.order('created_at', { ascending: false });
                if (error) throw error;
                
                statusContainer.classList.add('hidden');
                listContent.classList.remove('hidden');
                document.getElementById('result-count').innerText = data.length;
                
                listContent.innerHTML = data.map(item => {
                    const isUnread = !item.is_read && item.receiver === currentUser.email;
                    const itemData = encodeURIComponent(JSON.stringify(item));
                    return `
                    <div class="mail-item flex items-center px-4 py-2 group cursor-pointer ${isUnread ? 'unread font-bold' : ''}" onclick="openPreview('${itemData}')">
                        <div class="flex items-center gap-3 mr-2">
                            <input type="checkbox" class="mail-checkbox" data-id="${item.id}" onclick="event.stopPropagation(); toggleItemSelect(${item.id}, this)">
                            <div class="w-4 flex justify-center">${isUnread ? '<div class="unread-dot"></div>' : '<i class="fa-regular fa-star text-gray-200"></i>'}</div>
                        </div>
                        <div class="flex flex-1 min-w-0 items-center gap-4">
                            <span class="text-sm text-gray-700 w-32 sm:w-40 truncate">${item.sender.split('@')[0]}</span>
                            <div class="flex-1 truncate flex items-center gap-2">
                                <span class="text-sm text-gray-900">${item.subject}</span>
                                ${getStatusBadge(item.status)}
                                ${item.file_url ? '<i class="fa-solid fa-paperclip text-[10px] text-gray-400"></i>' : ''}
                                ${item.image_url ? '<i class="fa-regular fa-image text-[10px] text-gray-400"></i>' : ''}
                            </div>
                        </div>
                        <div class="text-[10px] text-gray-400 ml-2 group-hover:hidden">${new Date(item.created_at).toLocaleDateString('th-TH', {day:'numeric', month:'short'})}</div>
                    </div>`;
                }).join('');
            } catch (err) { statusContainer.innerText = "Error loading data"; }
        }

        // Gmail Style Preview
        async function openPreview(encodedItem) {
            const item = JSON.parse(decodeURIComponent(encodedItem));
            const modal = document.getElementById('previewModal');
            const contentArea = document.getElementById('previewContent');
            const titleArea = document.getElementById('previewTitle');

            titleArea.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-lg font-normal text-gray-800">${item.subject}</span>
                    ${getStatusBadge(item.status)}
                </div>
            `;

            contentArea.innerHTML = `
                <div class="w-full max-w-5xl bg-white p-6 shadow-sm rounded-lg border border-gray-200 my-4 mx-4">
                    <div class="flex justify-between items-start mb-8">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white uppercase shadow-sm">${item.sender.charAt(0)}</div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="font-bold text-sm text-gray-900">${item.sender.split('@')[0]}</span>
                                    <span class="text-xs text-gray-500 font-light">&lt;${item.sender}&gt;</span>
                                </div>
                                <div class="text-xs text-gray-400">ถึง ฉัน</div>
                            </div>
                        </div>
                        <div class="text-xs text-gray-500 text-right">
                            <div>${new Date(item.created_at).toLocaleDateString('th-TH', { dateStyle: 'long' })}</div>
                            <div>${new Date(item.created_at).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}</div>
                        </div>
                    </div>
                    <div class="space-y-6">
                        ${item.file_url ? `
                            <div class="border rounded-xl overflow-hidden shadow-sm">
                                <div class="bg-gray-50 px-4 py-2 border-b text-xs font-medium text-gray-600 flex items-center gap-2"><i class="fa-solid fa-file-pdf text-red-500"></i> ไฟล์ PDF แนบ</div>
                                <iframe src="${item.file_url}" class="w-full h-[600px] bg-white border-none"></iframe>
                            </div>` : ''}
                        ${item.image_url ? `
                            <div class="border rounded-xl overflow-hidden shadow-sm">
                                <div class="bg-gray-50 px-4 py-2 border-b text-xs font-medium text-gray-600 flex items-center gap-2"><i class="fa-regular fa-image text-blue-500"></i> รูปภาพแนบ</div>
                                <div class="p-4 bg-gray-100 flex justify-center"><img src="${item.image_url}" class="max-w-full h-auto shadow-lg border rounded-lg"></div>
                            </div>` : ''}
                    </div>
                </div>`;

            modal.classList.remove('hidden');
            if (!item.is_read && item.receiver === currentUser.email) {
                await supabaseClient.from('documents').update({ is_read: true }).eq('id', item.id);
            }
        }

        // Form Submit
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const pdfFile = document.getElementById('fileInput').files[0];
            const imgFile = document.getElementById('imageInput').files[0];
            if(!pdfFile && !imgFile) { Swal.fire('แจ้งเตือน', 'กรุณาแนบไฟล์อย่างน้อย 1 อย่าง', 'warning'); return; }
            btn.disabled = true; btn.innerText = 'กำลังส่ง...';
            try {
                let pdfUrl = null, imageUrl = null;
                const uploads = [];
                if (pdfFile) {
                    const name = `pdf-${Date.now()}-${pdfFile.name}`;
                    uploads.push(supabaseClient.storage.from('pdfs').upload(`uploads/${name}`, pdfFile).then(() => {
                        pdfUrl = supabaseClient.storage.from('pdfs').getPublicUrl(`uploads/${name}`).data.publicUrl;
                    }));
                }
                if (imgFile) {
                    const name = `img-${Date.now()}-${imgFile.name}`;
                    uploads.push(supabaseClient.storage.from('images').upload(`uploads/${name}`, imgFile).then(() => {
                        imageUrl = supabaseClient.storage.from('images').getPublicUrl(`uploads/${name}`).data.publicUrl;
                    }));
                }
                await Promise.all(uploads);
                await supabaseClient.from('documents').insert([{
                    sender: currentUser.email, receiver: document.getElementById('receiver').value,
                    subject: document.getElementById('subject').value, category: document.querySelector('input[name="category"]:checked').value,
                    file_url: pdfUrl, image_url: imageUrl, status: 'pending'
                }]);
                toggleComposeModal(); loadData('sent');
                Swal.fire({ icon: 'success', title: 'ส่งสำเร็จ', timer: 1500, showConfirmButton: false });
            } catch (err) { Swal.fire('Error', err.message, 'error'); } 
            finally { btn.disabled = false; btn.innerText = "ส่ง"; }
        };

        async function handleLogout() {
            const { isConfirmed } = await Swal.fire({ title: 'ออกจากระบบ?', showCancelButton: true });
            if (isConfirmed) { await supabaseClient.auth.signOut(); window.location.href = 'login.html'; }
        }
    </script>
</body>
