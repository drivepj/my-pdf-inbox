<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhaibhubejhr Docs | Tracking</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .modal-active { display: flex !important; }
        #composeModal { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-16 flex items-center px-6 justify-between bg-white border-b shadow-sm z-50">
        <div class="flex items-center gap-3">
            <img src="https://www.abhaiherb.com/_nuxt/img/logo-large.f806b04.png" class="h-8">
            <h1 class="font-bold text-[#006a4e]">DOCS TRACKING</h1>
        </div>
        <button onclick="toggleScanner()" class="bg-[#006a4e] text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2">
            <i class="fa-solid fa-qrcode"></i> สแกนรับงาน
        </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 p-4 border-r bg-white hidden md:block">
            <button onclick="toggleComposeModal()" class="w-full flex items-center justify-center gap-3 py-3 bg-[#c2e7ff] hover:bg-[#b3d9f2] rounded-2xl font-bold transition-all">
                <i class="fa-solid fa-pencil"></i> สร้างเอกสาร
            </button>
            <div class="mt-6 space-y-1">
                <div onclick="loadDocs('all')" class="p-3 rounded-lg hover:bg-gray-100 cursor-pointer text-gray-700 flex items-center gap-3">
                    <i class="fa-solid fa-list"></i> ทั้งหมด
                </div>
                <div onclick="loadDocs('สร้างเอกสาร')" class="p-3 rounded-lg hover:bg-gray-100 cursor-pointer text-gray-700 flex items-center gap-3">
                    <i class="fa-regular fa-clock"></i> รอดำเนินการ
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4">
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b text-xs text-gray-500 uppercase">
                        <tr>
                            <th class="px-6 py-4">เลขเอกสาร</th>
                            <th class="px-6 py-4">หัวข้อ</th>
                            <th class="px-6 py-4">สถานะ</th>
                            <th class="px-6 py-4">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="docTableBody">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="composeModal" class="fixed inset-0 bg-black/50 z-[100] items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl">
                <span class="font-bold">เขียนเอกสารใหม่</span>
                <button onclick="toggleComposeModal()" class="text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="docForm" class="p-6 space-y-4">
                <input type="text" id="subject" placeholder="ระบุชื่อเรื่อง" class="w-full border-b py-2 outline-none text-lg focus:border-[#006a4e]" required>
                <textarea id="details" placeholder="รายละเอียด..." class="w-full border p-3 rounded-xl h-32 outline-none"></textarea>
                <div class="border-2 border-dashed border-gray-200 p-4 rounded-xl text-center">
                    <input type="file" id="pdfFile" accept="application/pdf" class="text-sm text-gray-500">
                </div>
                <button type="submit" id="btnSubmit" class="w-full bg-[#006a4e] text-white py-3 rounded-xl font-bold">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

   <div id="previewModal" class="hidden fixed inset-0 bg-black/60 z-[200] items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center">
        <div id="qrcode-container" class="inline-block p-4 border rounded-2xl mb-4 bg-white"></div>
        <h2 id="prevTitle" class="font-bold text-lg"></h2>
        <p id="prevNo" class="text-blue-600 font-mono font-bold my-2"></p>
        <button onclick="closePreview()" class="mt-4 w-full py-2 bg-gray-100 rounded-lg font-bold hover:bg-gray-200">ปิด</button>
    </div>
</div>

<div id="scannerModal" class="hidden fixed inset-0 bg-black/80 z-[300] items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden">
        <div class="p-4 border-b flex justify-between">
            <span class="font-bold">สแกน QR รับงาน</span>
            <button onclick="toggleScanner()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="reader"></div>
    </div>
</div>
<div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden animate__animated animate__fadeInUp">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <h3 class="font-bold text-lg text-gray-800">ติดตามสถานะเอกสาร</h3>
            <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div id="detailContent" class="p-6 max-h-[70vh] overflow-y-auto">
            </div>
        <div class="p-4 bg-gray-50 border-t text-center">
            <button onclick="closeDetail()" class="w-full py-3 bg-gray-200 rounded-xl font-bold text-gray-700">ปิดหน้าต่าง</button>
        </div>
    </div>
</div>


   <script>
    // --- 1. ตั้งค่า Supabase ---
    const SUPABASE_URL = 'https://lsajxgmstpokmxqcjrwd.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_9A3YXqClnAQT62tVSyvMyw_7k22B_DP';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- 2. UI Logic ---
    function toggleComposeModal() {
        const m = document.getElementById('composeModal');
        m.classList.toggle('modal-active');
    }

    function closePreview() {
        const modal = document.getElementById('previewModal');
        modal.classList.add('hidden');
        modal.classList.remove('modal-active');
    }

    // --- 3. โหลดข้อมูลลงตาราง (เพิ่มเงื่อนไขปุ่มปิดงาน) ---
    async function loadDocs(filter = 'all') {
        const tbody = document.getElementById('docTableBody');
        tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center">กำลังโหลด...</td></tr>';

        try {
            let query = _supabase.from('documents').select('*').order('created_at', { ascending: false });
            if (filter !== 'all') query = query.eq('status', filter);

            const { data, error } = await query;
            if (error) throw error;

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-gray-400">ไม่พบข้อมูลเอกสาร</td></tr>';
                return;
            }

            let html = '';
            data.forEach(d => {
                let actionBtn = '';
                let statusClass = 'bg-blue-100 text-blue-700'; // ค่าเริ่มต้น

                if (d.status === 'รับโดย Messenger') {
                    statusClass = 'bg-orange-100 text-orange-700';
                    // เปลี่ยนจากปุ่ม QR เป็นปุ่มปิดงาน
                    actionBtn = `<button onclick="finishJob('${d.id}', '${d.title}')" class="bg-green-600 text-white px-3 py-1 rounded-lg text-xs hover:bg-green-700 transition-all">ปิดงาน (Finish)</button>`;
                } else if (d.status === 'ส่งมอบสำเร็จ') {
                    statusClass = 'bg-gray-100 text-gray-600';
                    actionBtn = `<span class="text-gray-400 text-xs italic">เสร็จสิ้น</span>`;
                } else {
                    // สถานะ "สร้างเอกสาร"
                    statusClass = 'bg-green-100 text-green-700';
                    actionBtn = `<button onclick="viewQR('${d.id}', '${d.title}', '${d.doc_no}')" class="text-blue-500 hover:underline">QR</button>`;
                }

                html += `
                    <tr class="border-b hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 font-mono font-bold text-blue-600">${d.doc_no || 'Pending'}</td>
                        <td class="px-6 py-4 font-medium">${d.title || 'ไม่มีหัวข้อ'}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded text-[10px] font-bold ${statusClass}">${d.status}</span></td>
                        <td class="px-6 py-4">
                            ${actionBtn}
                        </td>
                    </tr>`;
            });
            tbody.innerHTML = html;
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-500">Error: ${err.message}</td></tr>`;
        }
    }

    // --- 4. ฟังก์ชันสำหรับ "ปิดงาน" ---
    async function finishJob(docId, title) {
        const result = await Swal.fire({
            title: 'ยืนยันการส่งมอบ?',
            text: `เอกสาร "${title}" ส่งถึงผู้รับเรียบร้อยแล้วใช่หรือไม่?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'ยืนยันส่งงาน',
            confirmButtonColor: '#059669'
        });

        if (result.isConfirmed) {
            Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
            const { error } = await _supabase
                .from('documents')
                .update({ status: 'ส่งมอบสำเร็จ' })
                .eq('id', docId);

            if (!error) {
                Swal.fire('สำเร็จ!', 'ปิดงานเรียบร้อยแล้ว', 'success');
                loadDocs();
            } else {
                Swal.fire('Error', error.message, 'error');
            }
        }
    }

    // --- 5. ระบบ QR & Scanner ---
    let html5QrCode;
    async function toggleScanner() {
        const modal = document.getElementById('scannerModal');
        modal.classList.toggle('hidden');
        modal.classList.toggle('modal-active');

        if (!modal.classList.contains('hidden')) {
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
            } catch (err) {
                Swal.fire('Error', 'เปิดกล้องไม่ได้: ' + err.message, 'error');
                toggleScanner();
            }
        } else if (html5QrCode) {
            await html5QrCode.stop();
        }
    }

    async function updateStatus(docId) {
        Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
        const { data, error } = await _supabase
            .from('documents')
            .update({ status: 'รับโดย Messenger' })
            .eq('id', docId.trim())
            .select();

        if (error) {
            Swal.fire('Error', error.message, 'error');
        } else if (data && data.length > 0) {
            Swal.fire('สำเร็จ!', `รับงาน "${data[0].title}" แล้ว`, 'success').then(() => {
                window.history.replaceState({}, document.title, window.location.pathname);
                loadDocs();
            });
        } else {
            Swal.fire('ไม่พบข้อมูล', 'รหัสเอกสารไม่ถูกต้อง', 'warning');
        }
    }

    async function onScanSuccess(decodedText) {
        if (html5QrCode) await html5QrCode.stop();
        toggleScanner();
        let finalId = decodedText;
        if (decodedText.includes('id=')) {
            finalId = new URL(decodedText).searchParams.get('id');
        }
        updateStatus(finalId);
    }

    function viewQR(id, title, docNo) {
        const qrBox = document.getElementById('qrcode-container');
        qrBox.innerHTML = '';
        const currentUrl = window.location.href.split('?')[0]; 
        const fullLink = `${currentUrl}?id=${id}`;
        new QRCode(qrBox, { text: fullLink, width: 180, height: 180 });
        document.getElementById('previewModal').classList.remove('hidden');
        document.getElementById('previewModal').classList.add('modal-active');
    }

    // --- 6. บันทึกข้อมูลใหม่ ---
   document.getElementById('docForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerText = 'กำลังสร้างเอกสารและลำดับการเซ็น...';

    const title = document.getElementById('subject').value;
    const desc = document.getElementById('details').value;

    // 1. สร้างเอกสารหลักก่อน
    const { data: newDoc, error: docErr } = await _supabase
        .from('documents')
        .insert([{
            title: title,
            description: desc,
            status: 'สร้างเอกสาร',
            current_step: 1 // เริ่มที่คนที่ 1
        }])
        .select(); // ดึง ID ที่เพิ่งสร้างออกมา

    if (docErr) {
        Swal.fire('Error', docErr.message, 'error');
        btn.disabled = false;
        return;
    }

    const docId = newDoc[0].id;

    // 2. กำหนดรายชื่อผู้ลงนาม 7 คน (แก้ไขชื่อตรงนี้ได้เลย)
    const approvers = [
        { name: 'หัวหน้าแผนกต้นทาง', seq: 1 },
        { name: 'ผู้ช่วยผู้อำนวยการ', seq: 2 },
        { name: 'ผู้อำนวยการกอง', seq: 3 },
        { name: 'หัวหน้าฝ่ายบัญชี', seq: 4 },
        { name: 'ผู้เชี่ยวชาญตรวจสอบ', seq: 5 },
        { name: 'รองอธิบดี', seq: 6 },
        { name: 'อธิบดี (ผู้อนุมัติสุดท้าย)', seq: 7 }
    ];

    // 3. ใส่รายชื่อทั้ง 7 คนลงในตาราง approvals
    const approvalRows = approvers.map(app => ({
        document_id: docId,
        approver_name: app.name,
        sequence_number: app.seq,
        status: 'ยังไม่เซ็น'
    }));

    const { error: appErr } = await _supabase
        .from('document_approvals')
        .insert(approvalRows);

    if (!appErr) {
        Swal.fire('สำเร็จ', 'สร้างเอกสารและกำหนดเส้นทางเซ็น 7 ขั้นตอนเรียบร้อย', 'success');
        document.getElementById('docForm').reset();
        toggleComposeModal();
        loadDocs();
    } else {
        Swal.fire('Error', 'สร้างรายชื่อคนเซ็นไม่สำเร็จ: ' + appErr.message, 'error');
    }

    btn.disabled = false;
    btn.innerText = 'บันทึกข้อมูล';
});

    // --- 7. เริ่มการทำงาน ---
    window.onload = async () => {
        loadDocs(); 
        const urlParams = new URLSearchParams(window.location.search);
        const scannedId = urlParams.get('id');
        if (scannedId) {
            updateStatus(scannedId);
        }
    };
    async function rejectJob(docId, title) {
    const { value: reason } = await Swal.fire({
        title: 'ระบุเหตุผลการตีกลับ',
        input: 'text',
        inputPlaceholder: 'เช่น เอกสารไม่ครบ, เซ็นผิดจุด...',
        showCancelButton: true,
        confirmButtonColor: '#d33'
    });

    if (reason) {
        const { error } = await _supabase
            .from('documents')
            .update({ 
                status: 'ตีกลับ',
                description: `เหตุผลการตีกลับ: ${reason}` // บันทึกเหตุผลทับในคำอธิบาย
            })
            .eq('id', docId);

        if (!error) {
            Swal.fire('บันทึกแล้ว', 'สถานะเปลี่ยนเป็นตีกลับเรียบร้อย', 'info');
            loadDocs();
        }
    }
}
// ฟังก์ชันสำหรับสร้าง HTML ของ Dashboard 7 ขั้นตอน
function renderProgress(steps) {
    // steps คือ array ของคนเซ็น 7 คนที่ดึงมาจากตาราง document_approvals
    let html = '<div class="flex items-center justify-between w-full mb-8">';
    
    steps.forEach((step, index) => {
        const isActive = step.status === 'เซ็นแล้ว';
        const isCurrent = !isActive && (index === 0 || steps[index-1].status === 'เซ็นแล้ว');
        
        html += `
            <div class="flex flex-col items-center flex-1">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold 
                    ${isActive ? 'bg-green-500 text-white' : (isCurrent ? 'bg-orange-500 text-white animate-pulse' : 'bg-gray-200 text-gray-500')}">
                    ${step.status === 'ตีกลับ' ? '❌' : index + 1}
                </div>
                <div class="text-[10px] mt-1 text-center font-medium">${step.approver_name}</div>
            </div>
            ${index < steps.length - 1 ? '<div class="h-[2px] flex-1 bg-gray-200"></div>' : ''}
        `;
    });
    
    html += '</div>';
    return html;
}
// ปรับในส่วนวนลูป data.forEach(d => { ... }) ใน loadDocs
const progressPercent = Math.min((d.current_step / 7) * 100, 100); 

html += `
    <tr class="border-b hover:bg-gray-50 transition-colors cursor-pointer" onclick="viewDetail('${d.id}')">
        <td class="px-6 py-4 font-mono font-bold text-blue-600">${d.doc_no || 'Pending'}</td>
        <td class="px-6 py-4">
            <div class="font-medium">${d.title}</div>
            <div class="w-full bg-gray-200 rounded-full h-1.5 mt-2">
                <div class="bg-blue-600 h-1.5 rounded-full" style="width: ${progressPercent}%"></div>
            </div>
            <p class="text-[9px] text-gray-500 mt-1">คืบหน้า ${d.current_step}/7 ขั้นตอน</p>
        </td>
        <td class="px-6 py-4"><span class="px-2 py-1 rounded text-[10px] font-bold ${statusClass}">${d.status}</span></td>
        <td class="px-6 py-4" onclick="event.stopPropagation()">${actionBtn}</td>
    </tr>`;
    
    // ฟังก์ชันเปิดดูรายละเอียด
async function viewDetail(docId) {
    const modal = document.getElementById('detailModal');
    const content = document.getElementById('detailContent');
    modal.classList.remove('hidden');
    content.innerHTML = '<div class="text-center py-10">กำลังโหลดความคืบหน้า...</div>';

    try {
        // ดึงข้อมูลการอนุมัติทั้ง 7 ขั้นตอน
        const { data: steps, error } = await _supabase
            .from('document_approvals')
            .select('*')
            .eq('document_id', docId)
            .order('sequence_number', { ascending: true });

        if (error) throw error;

        let html = '<div class="space-y-0 relative">';
        // เส้นประด้านหลัง
        html += '<div class="absolute left-4 top-2 bottom-2 w-0.5 bg-gray-200 z-0"></div>';

        steps.forEach((s, idx) => {
            const isDone = s.status === 'เซ็นแล้ว';
            const isCurrent = s.status === 'ยังไม่เซ็น' && (idx === 0 || steps[idx-1].status === 'เซ็นแล้ว');
            const isReject = s.status === 'ตีกลับ';
            
            // กำหนดสีและไอคอน
            let iconClass = 'bg-gray-200 text-white';
            let icon = idx + 1;
            if (isDone) { iconClass = 'bg-green-500 text-white'; icon = '✓'; }
            if (isCurrent) { iconClass = 'bg-orange-500 text-white shadow-lg shadow-orange-200 animate-pulse'; icon = '●'; }
            if (isReject) { iconClass = 'bg-red-500 text-white'; icon = '✕'; }

            html += `
                <div class="relative z-10 flex items-start mb-8 last:mb-0">
                    <div class="w-8 h-8 rounded-full ${iconClass} flex items-center justify-center font-bold text-sm flex-shrink-0 transition-all duration-500">
                        ${icon}
                    </div>
                    <div class="ml-4 pt-0.5">
                        <p class="font-bold ${isCurrent ? 'text-orange-600' : 'text-gray-700'}">${s.approver_name}</p>
                        <p class="text-xs text-gray-500 mt-0.5">
                            สถานะ: <span class="font-medium">${s.status}</span>
                            ${s.signed_at ? ` | เมื่อ: ${new Date(s.signed_at).toLocaleString('th-TH')}` : ''}
                        </p>
                        ${s.remarks ? `<p class="text-xs text-red-500 mt-1 italic border-l-2 border-red-200 pl-2">เหตุผล: ${s.remarks}</p>` : ''}
                    </div>
                </div>`;
        });

        html += '</div>';
        content.innerHTML = html;

    } catch (err) {
        content.innerHTML = `<div class="text-red-500 text-center">เกิดข้อผิดพลาด: ${err.message}</div>`;
    }
}

function closeDetail() {
    document.getElementById('detailModal').classList.add('hidden');
}
</script>
</body>
</html>
