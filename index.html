<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhaibhubejhr Docs | Tracking</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .modal-active { display: flex !important; }
        #composeModal { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-16 flex items-center px-6 justify-between bg-white border-b shadow-sm z-50">
        <div class="flex items-center gap-3">
            <img src="https://www.abhaiherb.com/_nuxt/img/logo-large.f806b04.png" class="h-8">
            <h1 class="font-bold text-[#006a4e]">DOCS TRACKING</h1>
        </div>
        <button onclick="toggleScanner()" class="bg-[#006a4e] text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2">
            <i class="fa-solid fa-qrcode"></i> สแกนรับงาน
        </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 p-4 border-r bg-white hidden md:block">
            <button onclick="toggleComposeModal()" class="w-full flex items-center justify-center gap-3 py-3 bg-[#c2e7ff] hover:bg-[#b3d9f2] rounded-2xl font-bold transition-all">
                <i class="fa-solid fa-pencil"></i> สร้างเอกสาร
            </button>
            <div class="mt-6 space-y-1">
                <div onclick="loadDocs('all')" class="p-3 rounded-lg hover:bg-gray-100 cursor-pointer text-gray-700 flex items-center gap-3">
                    <i class="fa-solid fa-list"></i> ทั้งหมด
                </div>
                <div onclick="loadDocs('สร้างเอกสาร')" class="p-3 rounded-lg hover:bg-gray-100 cursor-pointer text-gray-700 flex items-center gap-3">
                    <i class="fa-regular fa-clock"></i> รอดำเนินการ
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4">
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b text-xs text-gray-500 uppercase">
                        <tr>
                            <th class="px-6 py-4">เลขเอกสาร</th>
                            <th class="px-6 py-4">หัวข้อ</th>
                            <th class="px-6 py-4">สถานะ</th>
                            <th class="px-6 py-4">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="docTableBody">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="composeModal" class="fixed inset-0 bg-black/50 z-[100] items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl">
                <span class="font-bold">เขียนเอกสารใหม่</span>
                <button onclick="toggleComposeModal()" class="text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="docForm" class="p-6 space-y-4">
                <input type="text" id="subject" placeholder="ระบุชื่อเรื่อง" class="w-full border-b py-2 outline-none text-lg focus:border-[#006a4e]" required>
                <textarea id="details" placeholder="รายละเอียด..." class="w-full border p-3 rounded-xl h-32 outline-none"></textarea>
                <div class="border-2 border-dashed border-gray-200 p-4 rounded-xl text-center">
                    <input type="file" id="pdfFile" accept="application/pdf" class="text-sm text-gray-500">
                </div>
                <button type="submit" id="btnSubmit" class="w-full bg-[#006a4e] text-white py-3 rounded-xl font-bold">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

   <div id="previewModal" class="hidden fixed inset-0 bg-black/60 z-[200] items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center">
        <div id="qrcode-container" class="inline-block p-4 border rounded-2xl mb-4 bg-white"></div>
        <h2 id="prevTitle" class="font-bold text-lg"></h2>
        <p id="prevNo" class="text-blue-600 font-mono font-bold my-2"></p>
        <button onclick="closePreview()" class="mt-4 w-full py-2 bg-gray-100 rounded-lg font-bold hover:bg-gray-200">ปิด</button>
    </div>
</div>

<div id="scannerModal" class="hidden fixed inset-0 bg-black/80 z-[300] items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden">
        <div class="p-4 border-b flex justify-between">
            <span class="font-bold">สแกน QR รับงาน</span>
            <button onclick="toggleScanner()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="reader"></div>
    </div>
</div>
<div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 z-[999] hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <h3 class="font-bold text-lg text-gray-800">ติดตามสถานะเอกสาร</h3>
            <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 text-3xl line-height-0">&times;</button>
        </div>
        <div id="detailContent" class="p-6 max-h-[70vh] overflow-y-auto">
            </div>
        <div class="p-4 bg-gray-50 border-t">
            <button onclick="closeDetail()" class="w-full py-3 bg-gray-200 hover:bg-gray-300 rounded-xl font-bold text-gray-700 transition-colors">
                ปิดหน้าต่าง
            </button>
        </div>
    </div>
</div>


<script>
    // --- 1. ตั้งค่า Supabase ---
    const SUPABASE_URL = 'https://lsajxgmstpokmxqcjrwd.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_9A3YXqClnAQT62tVSyvMyw_7k22B_DP';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- 2. UI Logic ---
    function toggleComposeModal() {
        document.getElementById('composeModal').classList.toggle('modal-active');
    }

    function closePreview() {
        document.getElementById('previewModal').classList.add('hidden');
    }

    function closeDetail() {
        const modal = document.getElementById('detailModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    // --- 3. โหลดข้อมูลลงตาราง ---
    async function loadDocs(filter = 'all') {
        const tbody = document.getElementById('docTableBody');
        tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-gray-500">กำลังโหลดข้อมูล...</td></tr>';

        try {
            let query = _supabase.from('documents').select('*').order('created_at', { ascending: false });
            if (filter !== 'all') query = query.eq('status', filter);

            const { data, error } = await query;
            if (error) throw error;

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-gray-400">ไม่พบข้อมูลเอกสาร</td></tr>';
                return;
            }

            let html = '';
            data.forEach(d => {
                let actionBtn = '';
                let statusClass = '';
                
                if (d.status === 'ส่งมอบสำเร็จ') {
                    statusClass = 'bg-gray-100 text-gray-600';
                    actionBtn = `<span class="text-gray-400 text-[10px] italic">เสร็จสิ้น</span>`;
                } 
                else if (d.status === 'รับโดย Messenger' || d.status === 'กำลังวนเซ็น') {
                    statusClass = 'bg-orange-100 text-orange-700';
                    // โชว์ 2 ปุ่ม: จัดการเซ็น (ปุ่มหลัก) และ QR (ปุ่มรอง)
                    actionBtn = `
                        <div class="flex flex-col gap-1">
                            <button onclick="handleNextStep('${d.id}', ${d.current_step}, '${d.title}')" 
                                    class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-blue-700 shadow-sm transition-all">
                                จัดการเซ็น (${d.current_step}/7)
                            </button>
                            <button onclick="viewQR('${d.id}', '${d.title}')" 
                                    class="text-blue-500 hover:bg-blue-50 px-2 py-1 rounded text-[9px] border border-blue-200">
                                <i class="fa-solid fa-qrcode"></i> ดู QR งาน
                            </button>
                        </div>`;
                } 
                else if (d.status === 'ตีกลับ') {
                    statusClass = 'bg-red-100 text-red-700';
                    actionBtn = `<button onclick="viewQR('${d.id}', '${d.title}')" class="text-blue-500 hover:underline text-[10px] font-bold">QR ใหม่</button>`;
                }
                else {
                    // สถานะ "สร้างเอกสาร" (รอสแกนรับครั้งแรก)
                    statusClass = 'bg-green-100 text-green-700';
                    actionBtn = `
                        <button onclick="viewQR('${d.id}', '${d.title}')" 
                                class="bg-[#006a4e] text-white px-3 py-2 rounded-lg text-[10px] font-bold hover:opacity-90 flex items-center gap-1 shadow-sm">
                            <i class="fa-solid fa-qrcode"></i> เปิด QR รับงาน
                        </button>`;
                }

                const progressPercent = Math.min(((d.current_step || 1) / 7) * 100, 100);
                const barColor = d.status === 'ส่งมอบสำเร็จ' ? 'bg-gray-400' : 'bg-[#006a4e]';

                html += `
                    <tr class="border-b hover:bg-gray-50 transition-colors cursor-pointer" onclick="viewDetail('${d.id}')">
                        <td class="px-6 py-4 font-mono font-bold text-blue-600 text-xs">${d.doc_no || 'DOC-' + d.id.slice(0,4)}</td>
                        <td class="px-6 py-4">
                            <div class="font-medium text-gray-800 text-sm">${d.title}</div>
                            <div class="w-full bg-gray-200 rounded-full h-1 mt-2 max-w-[120px]">
                                <div class="${barColor} h-1 rounded-full transition-all duration-500" style="width: ${progressPercent}%"></div>
                            </div>
                            <p class="text-[9px] text-gray-500 mt-1 italic">Step ${d.current_step || 1}/7</p>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-[9px] font-bold ${statusClass}">${d.status}</span>
                        </td>
                        <td class="px-6 py-4" onclick="event.stopPropagation()">
                            ${actionBtn}
                        </td>
                    </tr>`;
            });
            tbody.innerHTML = html;
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-500 text-xs">Error: ${err.message}</td></tr>`;
        }
    }

    // --- 4. ฟังก์ชันจัดการขั้นตอนการเซ็น ---
    async function handleNextStep(docId, currentStep, title) {
        const { value: action } = await Swal.fire({
            title: `จัดการขั้นตอนที่ ${currentStep}/7`,
            text: `เรื่อง: ${title}`,
            icon: 'question',
            showCancelButton: true,
            showDenyButton: true,
            confirmButtonText: '✅ เซ็นแล้ว',
            denyButtonText: '❌ ตีกลับ (Reject)',
            cancelButtonText: 'ยกเลิก',
            confirmButtonColor: '#059669',
            denyButtonColor: '#d33',
        });

        if (action === true) {
            Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
            await _supabase.from('document_approvals').update({ status: 'เซ็นแล้ว', signed_at: new Date().toISOString() })
                .eq('document_id', docId).eq('sequence_number', currentStep);

            let nextStep = currentStep + 1;
            let finalStatus = 'กำลังวนเซ็น';
            if (currentStep >= 7) { finalStatus = 'ส่งมอบสำเร็จ'; nextStep = 7; }

            const { error } = await _supabase.from('documents').update({ status: finalStatus, current_step: nextStep }).eq('id', docId);

            if (!error) {
                Swal.fire('สำเร็จ', currentStep >= 7 ? 'จบงานเรียบร้อย!' : `ไปที่ขั้นตอนที่ ${nextStep}`, 'success');
                loadDocs();
            }
        } 
        else if (action === false) {
            const { value: reason } = await Swal.fire({
                title: 'เหตุผลการตีกลับ',
                input: 'text',
                inputPlaceholder: 'ระบุเหตุผล...',
                showCancelButton: true,
                confirmButtonText: 'ยืนยันตีกลับ',
                confirmButtonColor: '#d33'
            });

            if (reason) {
                Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
                await _supabase.from('document_approvals').update({ status: 'ตีกลับ', remarks: reason })
                    .eq('document_id', docId).eq('sequence_number', currentStep);
                await _supabase.from('documents').update({ status: 'ตีกลับ' }).eq('id', docId);
                
                Swal.fire('ตีกลับแล้ว', 'ส่งเรื่องกลับไปยังต้นทาง', 'error');
                loadDocs();
            }
        }
    }

    // --- 5. ระบบไทม์ไลน์ ---
    async function viewDetail(docId) {
        const modal = document.getElementById('detailModal');
        const content = document.getElementById('detailContent');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        content.innerHTML = '<div class="text-center py-10 text-xs text-gray-500">กำลังโหลด...</div>';

        try {
            const { data: steps } = await _supabase.from('document_approvals').select('*').eq('document_id', docId).order('sequence_number', { ascending: true });
            let html = '<div class="relative pl-8 space-y-6"><div class="absolute left-[11px] top-2 bottom-2 w-0.5 bg-gray-200"></div>';
            steps.forEach((s, idx) => {
                const isDone = s.status === 'เซ็นแล้ว';
                const isReject = s.status === 'ตีกลับ';
                let iconClass = 'bg-gray-200 text-gray-400';
                if (isDone) iconClass = 'bg-green-500 text-white';
                else if (isReject) iconClass = 'bg-red-500 text-white';

                html += `
                    <div class="relative">
                        <div class="absolute -left-[29px] w-6 h-6 rounded-full ${iconClass} flex items-center justify-center font-bold text-[10px] z-10 border-2 border-white">
                            ${isDone ? '✓' : (isReject ? '✕' : idx+1)}
                        </div>
                        <div>
                            <p class="font-bold text-sm text-gray-700">${s.approver_name}</p>
                            <p class="text-[10px] text-gray-400">${s.status} ${s.signed_at ? '| ' + new Date(s.signed_at).toLocaleTimeString('th-TH') : ''}</p>
                            ${s.remarks ? `<p class="text-[10px] text-red-500 bg-red-50 p-2 mt-1 rounded italic">เหตุผล: ${s.remarks}</p>` : ''}
                        </div>
                    </div>`;
            });
            content.innerHTML = html + '</div>';
        } catch (err) { content.innerHTML = 'Error loading timeline'; }
    }

    // --- 6. ระบบ QR & Scanner ---
    let html5QrCode;
    async function toggleScanner() {
        const modal = document.getElementById('scannerModal');
        modal.classList.toggle('hidden');
        if (!modal.classList.contains('hidden')) {
            html5QrCode = new Html5Qrcode("reader");
            await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
        } else if (html5QrCode) { await html5QrCode.stop(); }
    }

    async function onScanSuccess(decodedText) {
        if (html5QrCode) await html5QrCode.stop();
        toggleScanner();
        let finalId = decodedText.includes('id=') ? new URL(decodedText).searchParams.get('id') : decodedText;
        updateStatus(finalId);
    }

    async function updateStatus(docId) {
        if(!docId) return;
        Swal.fire({ title: 'กำลังรับงาน...', didOpen: () => Swal.showLoading() });
        const { data, error } = await _supabase.from('documents').update({ status: 'รับโดย Messenger' }).eq('id', docId.trim()).select();
        if (!error && data.length > 0) {
            Swal.fire('สำเร็จ!', 'Messenger รับงานเรียบร้อย', 'success').then(() => {
                window.history.replaceState({}, document.title, window.location.pathname);
                loadDocs();
            });
        }
    }

    function viewQR(id, title) {
        const qrBox = document.getElementById('qrcode-container');
        qrBox.innerHTML = '';
        const currentUrl = window.location.href.split('?')[0]; 
        const fullLink = `${currentUrl}?id=${id}`;
        new QRCode(qrBox, { text: fullLink, width: 180, height: 180 });
        document.getElementById('prevTitle').innerText = title;
        document.getElementById('previewModal').classList.remove('hidden');
    }

    // --- 7. บันทึกข้อมูลใหม่ ---
    document.getElementById('docForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        const title = document.getElementById('subject').value;
        const desc = document.getElementById('details').value;

        try {
            const { data: newDoc } = await _supabase.from('documents').insert([{ title, description: desc, status: 'สร้างเอกสาร', current_step: 1 }]).select();
            const approvers = ['หัวหน้าแผนก', 'ผู้ช่วย ผอ.', 'ผอ.กอง', 'ฝ่ายบัญชี', 'ผู้เชี่ยวชาญ', 'รองอธิบดี', 'อธิบดี'];
            const approvalRows = approvers.map((name, i) => ({ document_id: newDoc[0].id, approver_name: name, sequence_number: i+1, status: 'ยังไม่เซ็น' }));
            await _supabase.from('document_approvals').insert(approvalRows);
            
            Swal.fire('สำเร็จ', 'สร้างงานเดินเอกสารเรียบร้อย', 'success');
            document.getElementById('docForm').reset();
            toggleComposeModal();
            loadDocs();
        } catch (err) { Swal.fire('Error', err.message, 'error'); }
        finally { btn.disabled = false; }
    });

    window.onload = () => {
        loadDocs(); 
        const scannedId = new URLSearchParams(window.location.search).get('id');
        if (scannedId) updateStatus(scannedId);
    };
</script>
</body>
</html>
