<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เขียนเอกสารใหม่ | PDF System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        body { font-family: 'Google Sans', sans-serif; background-color: #f6f8fc; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-xl bg-white rounded-[2rem] shadow-sm border border-gray-100 p-8 md:p-12">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white">
                <i class="fa-solid fa-pencil"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">เขียนเอกสารใหม่</h2>
        </div>

        <form id="uploadForm" class="space-y-4">
            <input type="email" id="sender" placeholder="จาก (อีเมลของคุณ)" required 
                class="w-full p-4 bg-gray-50 rounded-2xl border border-transparent focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 outline-none transition-all">
            
            <input type="email" id="receiver" placeholder="ถึง (อีเมลผู้รับ)" required 
                class="w-full p-4 bg-gray-50 rounded-2xl border border-transparent focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 outline-none transition-all">
            
            <input type="text" id="subject" placeholder="หัวข้อเรื่อง" required 
                class="w-full p-4 bg-gray-50 rounded-2xl border border-transparent focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 outline-none transition-all">
            
            <div class="group relative border-2 border-dashed border-gray-200 rounded-3xl p-10 text-center hover:bg-blue-50 hover:border-blue-300 transition-all cursor-pointer">
                <input type="file" id="fileInput" accept=".pdf" required class="absolute inset-0 opacity-0 cursor-pointer">
                <div id="fileArea">
                    <i class="fa-solid fa-file-pdf text-4xl text-gray-300 mb-3 group-hover:text-blue-400"></i>
                    <p id="fileName" class="text-gray-500">คลิกเพื่อเลือกไฟล์ PDF</p>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full py-4 bg-blue-600 text-white rounded-full font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                ส่งเอกสาร
            </button>
        </form>
        <a href="index.html" class="block text-center mt-6 text-gray-400 hover:text-blue-600 transition-colors">← กลับไปหน้า Inbox</a>
    </div>

    <script>
        const SB_URL = 'https://ijxeejypdjwwnejjbxbq.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqeGVlanlwZGp3d25lampieGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDA0NzIsImV4cCI6MjA5MzYxNjQ3Mn0.NHCzfKueKHdA763QBWZ_civHzUSUcie9aUqBBt7Yrek'; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('fileInput').onchange = (e) => {
            const name = e.target.files[0]?.name || "คลิกเพื่อเลือกไฟล์ PDF";
            document.getElementById('fileName').innerText = name;
            document.getElementById('fileName').classList.add('text-blue-600', 'font-bold');
        };

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "กำลังส่ง...";

            const file = document.getElementById('fileInput').files[0];
            const fileExt = file.name.split('.').pop();
            const filePath = `${Date.now()}.${fileExt}`;

            try {
                // 1. อัปโหลดไฟล์ไปที่ Bucket 'pdfs'
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('pdfs')
                    .upload(filePath, file);

                if (uploadError) throw uploadError;

                // 2. ดึง Public URL ของไฟล์ที่อัปโหลด
                const { data: urlData } = supabaseClient.storage.from('pdfs').getPublicUrl(filePath);

                // 3. บันทึกลงตาราง documents
                const { error: dbError } = await supabaseClient.from('documents').insert([{
                    sender: document.getElementById('sender').value,
                    receiver: document.getElementById('receiver').value,
                    subject: document.getElementById('subject').value,
                    file_url: urlData.publicUrl
                }]);

                if (dbError) throw dbError;

                alert('ส่งเอกสารสำเร็จ!');
                window.location.href = 'index.html';
            } catch (err) {
                alert('ข้อผิดพลาด: ' + err.message);
                btn.disabled = false; btn.innerText = "ส่งเอกสาร";
            }
        };
    </script>
</body>
</html>
