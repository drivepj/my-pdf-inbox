<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งเอกสารใหม่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-white rounded-[2.5rem] shadow-2xl p-10 border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-4 rotate-12">
                <i class="fa-solid fa-file-arrow-up text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">อัปโหลดเอกสารใหม่</h2>
            <p class="text-slate-400">ระบบนำส่งไฟล์ PDF เข้าสู่ระบบสารบรรณ</p>
        </div>

        <form id="uploadForm" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">จาก (Sender)</label>
                <input type="email" id="sender" required class="w-full px-5 py-3 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">ถึง (Receiver)</label>
                <input type="email" id="receiver" required class="w-full px-5 py-3 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">หัวข้อเรื่อง</label>
                <input type="text" id="subject" required class="w-full px-5 py-3 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-500 outline-none transition-all">
            </div>

            <div class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl p-6 text-center cursor-pointer hover:bg-slate-100 transition-all relative">
                <input type="file" id="fileInput" accept=".pdf" required class="absolute inset-0 opacity-0 cursor-pointer">
                <i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-300 mb-2"></i>
                <p class="text-sm text-slate-500">คลิกหรือลากไฟล์ PDF มาวางที่นี่</p>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-4 rounded-full font-bold text-lg hover:bg-black transition-all shadow-lg active:scale-95">
                ส่งเอกสารเข้าฐานข้อมูล
            </button>
        </form>
        
        <a href="index.html" class="block text-center mt-6 text-slate-400 hover:text-blue-600 text-sm font-bold transition-all">← กลับหน้ากล่องจดหมาย</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    </body>
</html>
