<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPDF | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        
        body { 
            font-family: 'Inter', 'Kanit', sans-serif; 
            background-color: #f6f8fc; 
        }
        .login-card { 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15); 
        }
        .hidden-field { display: none; }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div class="login-card w-full max-w-[450px] p-10 mx-4">
        <div class="text-center mb-8">
            <img src="https://www.abhaiherb.com/_nuxt/img/logo-large.f806b04.png" 
                 class="h-16 w-auto mx-auto mb-4" 
                 alt="Abhaibhubejhr Logo"> 
            <h1 id="formTitle" class="text-xl font-bold text-gray-800 mb-1">เข้าสู่ระบบ</h1>
            <p class="text-sm text-gray-500">โรงพยาบาลเจ้าพระยาอภัยภูเบศร</p>
        </div>

        <form id="authForm" class="space-y-4">
            <div id="extraFields" class="hidden-field space-y-4">
                <input type="text" id="fullName" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:border-blue-500 outline-none" placeholder="ชื่อ-นามสกุล">
                <select id="department" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:border-blue-500 outline-none text-gray-700 bg-white">
                    <option value="" disabled selected>เลือกสายงาน / กลุ่มงาน</option>
                    <option value="สายการแพทย์">สายการแพทย์</option>
                    <option value="สายสมุนไพร">สายสมุนไพร / แพทย์แผนไทย</option>
                    <option value="สายไอที">สายไอที / ระบบสารสนเทศ</option>
                    <option value="สายสนับสนุนบริหาร">สายเอกสาร / ธุรการ / การเงิน</option>
                    <option value="สายบริหาร">สายบริหาร / หัวหน้าฝ่าย</option>
                </select>
            </div>

            <input type="email" id="email" required class="w-full px-4 py-3 border border-gray-300 rounded-md focus:border-blue-500 outline-none" placeholder="อีเมล">
            <input type="password" id="password" required minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:border-blue-500 outline-none" placeholder="รหัสผ่าน">
            
            <div class="flex items-center justify-between pt-4">
                <button type="button" onclick="toggleMode()" id="switchBtn" class="text-blue-600 font-semibold text-sm">สร้างบัญชี</button>
                <button type="submit" id="submitBtn" class="bg-[#0b57d0] text-white px-8 py-2 rounded-full font-semibold hover:bg-[#0842a0] transition-all active:scale-95 flex items-center justify-center min-w-[100px]">
                    <span id="btnText">ถัดไป</span>
                </button>
            </div>
        </form>
    </div>

<script>
    const SB_URL = 'https://ijxeejypdjwwnejjbxbq.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqeGVlanlwZGp3d25lampieGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDA0NzIsImV4cCI6MjA5MzYxNjQ3Mn0.NHCzfKueKHdA763QBWZ_civHzUSUcie9aUqBBt7Yrek'; 
    const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

    let isSignUpMode = false;

    function toggleMode() {
        isSignUpMode = !isSignUpMode;
        document.getElementById('extraFields').classList.toggle('hidden-field');
        document.getElementById('formTitle').innerText = isSignUpMode ? 'สร้างบัญชีใหม่' : 'เข้าสู่ระบบ';
        document.getElementById('btnText').innerText = isSignUpMode ? 'ลงทะเบียน' : 'ถัดไป';
        document.getElementById('switchBtn').innerText = isSignUpMode ? 'มีบัญชีแล้ว? เข้าสู่ระบบ' : 'สร้างบัญชี';
        
        // ล้างค่าเมื่อสลับโหมด
        if (!isSignUpMode) {
            document.getElementById('fullName').value = '';
            document.getElementById('department').value = '';
        }
    }

    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value;
        const dept = document.getElementById('department').value;

        // Validation เบื้องต้นสำหรับ Sign Up
        if (isSignUpMode) {
            if (!fullName || !dept) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกชื่อ-นามสกุล และเลือกสายงาน', 'warning');
                return;
            }
        }

        Swal.fire({ 
            title: 'กำลังดำเนินการ...', 
            allowOutsideClick: false, 
            didOpen: () => Swal.showLoading() 
        });

        try {
            if (isSignUpMode) {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: { 
                        data: { 
                            full_name: fullName, 
                            department: dept,
                            display_name: fullName.split(' ')[0] // เก็บชื่อเล่น/ชื่อแรกไว้แสดงผล
                        } 
                    }
                });
                
                if (error) throw error;

                // เช็คว่าต้องยืนยันอีเมลหรือไม่
                if (data.user && data.session === null) {
                    Swal.fire('ลงทะเบียนสำเร็จ', 'ระบบได้ส่งลิงก์ยืนยันตัวตนไปที่อีเมลของคุณแล้ว กรุณาตรวจสอบกล่องจดหมาย', 'success');
                } else {
                    Swal.fire('สำเร็จ', 'สร้างบัญชีเรียบร้อยแล้ว', 'success');
                }
                toggleMode();
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                // Login สำเร็จ
                window.location.href = 'index.html';
            }
        } catch (err) {
            let msg = err.message;
            // แปลข้อความ Error พื้นฐานเป็นภาษาไทย (Optional)
            if (msg === 'Invalid login credentials') msg = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
            if (msg === 'User already registered') msg = 'อีเมลนี้ถูกใช้งานไปแล้ว';
            
            Swal.fire('ข้อผิดพลาด', msg, 'error');
        }
    };

    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            window.location.href = 'index.html';
        }
    }
    window.onload = checkSession;
</script>
</body>
</html>
