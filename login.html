<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPDF | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f6f8fc; }
        .login-card { background: white; border-radius: 24px; box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div class="login-card w-full max-w-[450px] p-10 mx-4">
        <div class="text-center mb-8">
            <div class="flex justify-center items-center gap-2 mb-4">
                <i class="fa-solid fa-file-pdf text-red-500 text-3xl"></i>
                <span class="text-2xl font-semibold text-gray-700">CloudPDF</span>
            </div>
            <h1 id="formTitle" class="text-2xl font-normal text-gray-900 mb-2">เข้าสู่ระบบ</h1>
            <p id="formSubTitle" class="text-gray-600">ใช้บัญชี CloudPDF ของคุณ</p>
        </div>

        <form id="authForm" class="space-y-4">
            <div class="relative">
                <input type="email" id="email" required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-400"
                    placeholder="อีเมล">
            </div>
            <div class="relative">
                <input type="password" id="password" required minlength="6"
                    class="w-full px-4 py-3 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-400"
                    placeholder="รหัสผ่าน (6 ตัวขึ้นไป)">
            </div>

            <div class="flex items-center justify-between pt-4">
                <button type="button" onclick="toggleMode()" id="switchBtn" class="text-blue-600 font-semibold hover:bg-blue-50 px-2 py-1 rounded transition-all text-sm">
                    สร้างบัญชี
                </button>
                <button type="submit" id="submitBtn" class="bg-[#0b57d0] text-white px-8 py-2 rounded-full font-semibold hover:bg-[#0842a0] transition-all shadow-sm">
                    ถัดไป
                </button>
            </div>
        </form>
    </div>

    <script>
        // ใช้ URL และ Key ชุดเดียวกับที่หน้า index.html
        const SB_URL = 'https://ijxeejypdjwwnejjbxbq.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqeGVlanlwZGp3d25lampieGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDA0NzIsImV4cCI6MjA5MzYxNjQ3Mn0.NHCzfKueKHdA763QBWZ_civHzUSUcie9aUqBBt7Yrek'; 
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('formTitle').innerText = isLoginMode ? 'เข้าสู่ระบบ' : 'สร้างบัญชี';
            document.getElementById('formSubTitle').innerText = isLoginMode ? 'ใช้บัญชี CloudPDF ของคุณ' : 'สมัครสมาชิกเพื่อเริ่มใช้งาน';
            document.getElementById('switchBtn').innerText = isLoginMode ? 'สร้างบัญชี' : 'มีบัญชีอยู่แล้ว?';
            document.getElementById('submitBtn').innerText = isLoginMode ? 'ถัดไป' : 'สมัครสมาชิก';
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.innerText = 'กำลังดำเนินการ...';

            try {
                if (isLoginMode) {
                    // เข้าสู่ระบบ
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = 'index.html';
                } else {
                    // สมัครสมาชิก
                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'สร้างบัญชีสำเร็จ!',
                        text: 'คุณสามารถเข้าสู่ระบบได้ทันที',
                        confirmButtonText: 'ตกลง'
                    }).then(() => {
                        toggleMode(); // สลับกลับไปหน้า Login
                    });
                }
            } catch (err) {
                Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = isLoginMode ? 'ถัดไป' : 'สมัครสมาชิก';
            }
        };

        // เช็คว่าถ้า Login ค้างไว้อยู่แล้ว ให้ไปหน้า index เลย
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) window.location.href = 'index.html';
        };
    </script>
</body>
</html>
