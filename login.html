<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPDF | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Inter', 'Kanit', sans-serif; background-color: #f6f8fc; }
        .login-card { background: white; border-radius: 24px; box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15); }
        .hidden-field { display: none; }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div class="login-card w-full max-w-[450px] p-10 mx-4">
        <div class="text-center mb-8">
            <div class="flex justify-center items-center gap-2 mb-4">
                <i class="fa-solid fa-file-pdf text-red-500 text-3xl"></i>
                <span class="text-2xl font-semibold text-gray-700">CloudPDF</span>
            </div>
            <h1 id="formTitle" class="text-2xl font-normal text-gray-900 mb-2">เข้าสู่ระบบ</h1>
            <p id="formSubTitle" class="text-gray-600">ใช้บัญชี CloudPDF ของคุณ</p>
        </div>

        <form id="authForm" class="space-y-4">
            <div id="extraFields" class="hidden-field space-y-4">
                <input type="text" id="fullName" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:border-blue-500 outline-none" placeholder="ชื่อ-นามสกุล">
                
                <select id="department" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:border-blue-500 outline-none text-gray-700 bg-white">
                    <option value="" disabled selected>เลือกสายงาน / กลุ่มงาน</option>
                    <optgroup label="🩺 สายการแพทย์">
                        <option value="สายการแพทย์">สายการแพทย์ (แพทย์/พยาบาล/เทคนิค)</option>
                    </optgroup>
                    <optgroup label="🌿 สายสมุนไพร / แพทย์แผนไทย">
                        <option value="สายสมุนไพร">สายสมุนไพร / แพทย์แผนไทย</option>
                    </optgroup>
                    <optgroup label="💻 สายไอที / ระบบสารสนเทศ">
                        <option value="สายไอที">สายไอที / ระบบสารสนเทศ</option>
                    </optgroup>
                    <optgroup label="📄 สายเอกสาร / ธุรการ / การเงิน">
                        <option value="สายสนับสนุนบริหาร">สายเอกสาร / ธุรการ / การเงิน</option>
                    </optgroup>
                    <optgroup label="⚙️ สายวิศวกรรม / ช่าง">
                        <option value="สายช่างและวิศวกรรม">สายวิศวกรรม / ช่าง</option>
                    </optgroup>
                    <optgroup label="🧹 สายบริการทั่วไป">
                        <option value="สายบริการ">สายบริการทั่วไป (พนักงานเปล/รปภ./แม่บ้าน)</option>
                    </optgroup>
                    <optgroup label="🏢 สายบริหาร">
                        <option value="สายบริหาร">สายบริหาร / หัวหน้าฝ่าย</option>
                    </optgroup>
                </select>
            </div>

            <input type="email" id="email" required class="w-full px-4 py-3 border border-gray-300 rounded-md focus:border-blue-500 outline-none" placeholder="อีเมล">
            <input type="password" id="password" required minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:border-blue-500 outline-none" placeholder="รหัสผ่าน">
            
            <div class="flex items-center justify-between pt-4">
                <button type="button" onclick="toggleMode()" id="switchBtn" class="text-blue-600 font-semibold text-sm">สร้างบัญชี</button>
                <button type="submit" id="submitBtn" class="bg-[#0b57d0] text-white px-8 py-2 rounded-full font-semibold hover:bg-[#0842a0] transition-colors">ถัดไป</button>
            </div>
        </form>
    </div>

    <script>
        const SB_URL = 'https://ijxeejypdjwwnejjbxbq.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqeGVlanlwZGp3d25lampieGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDA0NzIsImV4cCI6MjA5MzYxNjQ3Mn0.NHCzfKueKHdA763QBWZ_civHzUSUcie9aUqBBt7Yrek'; 
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            const extraFields = document.getElementById('extraFields');
            const formTitle = document.getElementById('formTitle');
            const switchBtn = document.getElementById('switchBtn');
            const submitBtn = document.getElementById('submitBtn');

            if (isLoginMode) {
                extraFields.style.display = 'none';
                formTitle.innerText = 'เข้าสู่ระบบ';
                switchBtn.innerText = 'สร้างบัญชี';
                submitBtn.innerText = 'ถัดไป';
            } else {
                extraFields.style.display = 'block';
                formTitle.innerText = 'สร้างบัญชี';
                switchBtn.innerText = 'มีบัญชีอยู่แล้ว?';
                submitBtn.innerText = 'ลงทะเบียน';
            }
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) window.location.href = 'index.html';
        };

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            
            btn.disabled = true;
            btn.innerText = "โปรดรอ...";

            try {
                if (isLoginMode) {
                    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = 'index.html';
                } else {
                    const fullName = document.getElementById('fullName').value;
                    const department = document.getElementById('department').value;

                    if(!fullName || !department) throw new Error("กรุณากรอกข้อมูลให้ครบถ้วน");

                    const { error } = await supabaseClient.auth.signUp({ 
                        email, 
                        password,
                        options: {
                            data: { 
                                full_name: fullName,
                                department: department
                            }
                        }
                    });
                    if (error) throw error;
                    
                    Swal.fire('สำเร็จ!', 'สร้างบัญชีแล้ว เข้าสู่ระบบได้เลย', 'success').then(() => toggleMode());
                }
            } catch (err) {
                Swal.fire('ผิดพลาด', err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = isLoginMode ? "ถัดไป" : "ลงทะเบียน";
            }
        };
    </script>
</body>
</html>
